name: Report Contract Gate

# Phase 2 Program 1e — Build-time contract gate workflow.
# Codex iter-7 §1e-AGREE absorb (thread 019e0119): targeted gate test +
# JSON/Markdown artifact upload + Marocchino sticky PR comment + final
# exit-code propagation. Independent of full Maven reactor build.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  contract-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Run report contract gate test + R16 stub detector
        id: gate
        continue-on-error: true
        working-directory: .
        # R16 PR-A (Codex 019e2804 REVISE P1 absorb): contract gate lane
        # now includes ContractRuleStubDetectorTest so silent RC stub
        # regressions are caught here (not only via full reactor test).
        run: ./mvnw -B -q -pl report-service -am test -Dtest='ReportDefinitionContractTest,ContractRuleStubDetectorTest' -Dsurefire.failIfNoSpecifiedTests=false

      - name: Ensure comment.md exists (failure fallback)
        if: always()
        run: |
          mkdir -p report-service/target/report-contract-gate
          if [ ! -f report-service/target/report-contract-gate/comment.md ]; then
            cat > report-service/target/report-contract-gate/comment.md <<'EOF'
          # Report Contract Gate

          :x: **Gate did not produce an artifact.**

          The contract gate test failed before reaching the Markdown writer (likely a
          compilation or infrastructure error). Check the workflow logs for details.
          EOF
          fi

      - name: Upload gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-contract-gate
          path: report-service/target/report-contract-gate/
          if-no-files-found: warn

      - name: Sticky PR comment
        # Fork PRs run with a read-only GITHUB_TOKEN — comment creation 403s
        # ("Resource not accessible by integration") and false-reds the job even
        # when the gate test itself passed (live case: PR #534). Skip for forks;
        # the gate verdict still fails the job via "Propagate gate failure" and
        # the uploaded artifact carries the report for reviewers.
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: report-contract-gate
          path: report-service/target/report-contract-gate/comment.md

      - name: Propagate gate failure
        if: steps.gate.outcome == 'failure'
        run: |
          echo "::error::Contract gate failed — see sticky PR comment + uploaded artifact for details."
          exit 1
