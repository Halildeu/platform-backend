name: CI - Image Build + GHCR Push

# Faz 19.8 dual-build — Codex AGREE 019dc0ef Option B
# Yeni image isimleri: ghcr.io/halildeu/platform-backend-<service>
# Gitops overlay'leri 19.9'da digest pin ile bu image'lara geçecek.
# Ssot CI paralel kalır (19.10'a kadar) — dual-build safety net.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: halildeu

jobs:
  build-and-push:
    name: Build + Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        service:
          - auth-service
          - user-service
          - variant-service
          - core-data-service
          - report-service
          - schema-service
          - permission-service
          - api-gateway
          - discovery-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build + Push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          provenance: false

      - name: Summary — digest (19.9 pin için kanıt)
        run: |
          echo "### ${{ matrix.service }} image push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pinnable**: \`${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/platform-backend-${{ matrix.service }}@${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # iter-49 backend deploy automation — Codex 019ddf43.
  # Matrix tüm service'ler SUCCESS olduktan sonra TEK dispatch event
  # gitops repo'ya gönderir. Deploy workflow runtime'da skopeo ile
  # per-service digest resolve eder (matrix output toplama karmaşası yok).
  dispatch:
    name: Dispatch backend-testai-deploy to gitops
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch event
        env:
          GH_TOKEN: ${{ secrets.GITOPS_DISPATCH_PAT }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::GITOPS_DISPATCH_PAT not set; skipping dispatch"
            exit 0
          fi
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          gh api repos/Halildeu/platform-k8s-gitops/dispatches \
            -X POST \
            -f event_type=backend-testai-deploy \
            -F "client_payload[sha]=${{ github.sha }}" \
            -F "client_payload[short_sha]=${SHORT_SHA}" \
            -F "client_payload[ref]=${{ github.ref_name }}"
          echo "Dispatched backend-testai-deploy to platform-k8s-gitops"
          echo "  - sha:       ${{ github.sha }}"
          echo "  - short_sha: ${SHORT_SHA}"
