name: CI - Maven Build Check

# Faz 19.2 — Batch 1 (auth + user + variant)
# Faz 19.3 — Batch 2 Zanzibar plane genişletildi (permission-service + common-auth)
# Full reactor build runs on workflow_dispatch mode=full-reactor

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Build mode: batch (default) or full-reactor'
        required: false
        default: 'batch'

jobs:
  batch-build:
    name: Maven compile + verify (batch scope)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Display Maven version
        run: ./mvnw --version

      - name: Compile batch scope (auth + user + variant + permission + common-auth)
        if: github.event_name != 'workflow_dispatch' || inputs.mode == 'batch'
        run: ./mvnw -q -DskipTests -pl auth-service,user-service,variant-service,permission-service,common-auth -am test-compile

      - name: Verify batch scope (auth + user + variant + permission + common-auth)
        if: github.event_name != 'workflow_dispatch' || inputs.mode == 'batch'
        run: ./mvnw -q -DskipTests -pl auth-service,user-service,variant-service,permission-service,common-auth -am verify

      - name: Full reactor build (opt-in)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'full-reactor'
        run: ./mvnw -q -DskipTests verify

  openfga-dsl-validate:
    name: OpenFGA DSL validate (syntax + parse)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check DSL file present
        run: |
          test -f openfga/model.fga || (echo "openfga/model.fga missing!" && exit 1)
          wc -l openfga/model.fga
          head -5 openfga/model.fga

      - name: Install fga CLI
        run: |
          curl -sL https://github.com/openfga/cli/releases/download/v0.6.0/fga_0.6.0_linux_amd64.tar.gz | tar -xz
          chmod +x fga
          ./fga --version

      - name: Validate DSL syntax
        run: |
          ./fga model validate --file openfga/model.fga
          echo "DSL PARSE OK"

      - name: Transform DSL to JSON (artefact)
        run: |
          ./fga model transform --file openfga/model.fga --output-format json > model.json
          echo "--- JSON keys ---"
          jq 'keys' model.json

      - name: Upload model.json artefact
        uses: actions/upload-artifact@v4
        with:
          name: openfga-model-json
          path: model.json
          retention-days: 30
