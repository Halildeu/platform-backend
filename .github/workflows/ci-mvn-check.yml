name: CI - Maven Build Check

# Faz 19.2 — Batch 1 (auth + user + variant)
# Faz 19.3 — Batch 2 Zanzibar plane genişletildi (permission-service + common-auth)
# Faz 19.4+19.5 — Batch 3+4 full reactor (core + report + api-gateway + discovery-server)
#   + schema-service (standalone, not in parent pom)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  full-reactor-build:
    name: Maven full reactor build (all 9 modules)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Display Maven version
        run: ./mvnw --version

      - name: Compile full reactor (9 modules)
        run: ./mvnw -q -DskipTests test-compile

      - name: Verify full reactor (9 modules, no tests)
        run: ./mvnw -q -DskipTests verify

  schema-service-build:
    name: schema-service standalone build (Faz 19.4+19.5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # schema-service parent pom'unda değil; ayrı lifecycle
    # Ama common-auth (1.1.0) dependency'i var — önce common-auth local install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Install common-auth to local Maven repo (schema-service dependency)
        run: ./mvnw -q -DskipTests -pl common-auth -am install

      - name: Build schema-service (standalone)
        run: |
          test -f schema-service/pom.xml || (echo "schema-service/pom.xml missing!" && exit 1)
          cd schema-service
          ../mvnw -q -DskipTests test-compile
          ../mvnw -q -DskipTests verify

  openfga-dsl-check:
    name: OpenFGA DSL presence + line check (basic)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    # Faz 19.3 — fga CLI v0.6 'but not' syntax incompat; full DSL validate
    # 19.8+'da newer fga CLI ile yeniden eklenecek. Şimdilik basic presence check.
    # Authoritative validation: K8s OpenFGA StatefulSet runtime (Vault kv/platform/openfga).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check DSL file present + size
        run: |
          test -f openfga/model.fga || (echo "openfga/model.fga missing!" && exit 1)
          wc -l openfga/model.fga
          echo "--- first 20 lines ---"
          head -20 openfga/model.fga
          echo "--- last 10 lines ---"
          tail -10 openfga/model.fga

      - name: Check DSL schema marker
        run: |
          grep -q "^model" openfga/model.fga
          grep -q "^  schema" openfga/model.fga
          grep -cE "^type " openfga/model.fga
          echo "DSL structural check PASS"
