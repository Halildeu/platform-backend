name: CI - Maven Build Check

# Faz 19.2 — Batch 1 (auth + user + variant)
# Faz 19.3 — Batch 2 Zanzibar plane genişletildi (permission-service + common-auth)
# Faz 19.4+19.5 — Batch 3+4 full reactor (core + report + api-gateway + discovery-server)
#   + schema-service (standalone, not in parent pom)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  full-reactor-build:
    name: Maven full reactor build (all 9 modules)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Display Maven version
        run: ./mvnw --version

      - name: Compile full reactor (9 modules)
        run: ./mvnw -q -DskipTests test-compile

      - name: Verify full reactor (9 modules, no tests)
        run: ./mvnw -q -DskipTests verify

  schema-service-build:
    name: schema-service standalone build (Faz 19.4+19.5)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # schema-service parent pom'unda değil; ayrı lifecycle
    # Ama common-auth (1.1.0) dependency'i var — önce common-auth local install
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Install common-auth to local Maven repo (schema-service dependency)
        run: ./mvnw -q -DskipTests -pl common-auth -am install

      - name: Build schema-service (standalone)
        run: |
          test -f schema-service/pom.xml || (echo "schema-service/pom.xml missing!" && exit 1)
          cd schema-service
          ../mvnw -q -DskipTests test-compile
          ../mvnw -q -DskipTests verify

  notification-orchestrator-test:
    name: notification-orchestrator Testcontainers PG test (Faz 23.1 Foundation)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 15

    # Codex 019df86f post-impl bulgu #1 absorb: notification-orchestrator
    # root reactor'a eklendi (PR #58) ama `mvnw -DskipTests verify` test'leri
    # atlıyordu. Bu lane Testcontainers PG ile gerçek 14+ test çalıştırır
    # (Spring context startup + Flyway V1 apply + JPA validate + 9 repository
    # custom query + cross-org collision + idempotency window + audit append).
    # Linux runners /var/run/docker.sock üzerinden Testcontainers PostgreSQL
    # 16-alpine spawn eder.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install reactor dependencies (common-auth shared)
        run: ./mvnw -q -DskipTests install -pl common-auth -am

      - name: Run notification-orchestrator tests (Testcontainers PG)
        run: ./mvnw -q -pl notification-orchestrator test

  permission-service-integration-test:
    name: permission-service Testcontainers integration test (Faz 21.3 PR-F C3c)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 15

    # Codex 019dcfb0 iter-1 BLOCKER #1: PR-F integration tests must run on
    # CI, not just locally. Linux runners ship with Docker on /var/run/docker.sock
    # so Testcontainers picks the daemon up without overrides. The
    # `integration-tests` Maven profile flips Surefire's group filter to
    # include only @Tag("integration") classes (DataAccessIntegrationTest
    # + DataAccessActivationContractTest, the latter via *ContractTest test
    # filter even though it carries no @Tag — keeps the activation contract
    # check on this slow lane too).

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install common-auth (parent reactor dependency, not in Maven Central)
        run: ./mvnw -q -pl common-auth install -DskipTests

      - name: Run permission-service Testcontainers integration tests
        run: ./mvnw -q -pl permission-service test -Pintegration-tests -Dtest='DataAccessIntegrationTest,DataAccessActivationContractTest,ImpersonationSessionIntegrationTest'

  report-service-mssql-integration-test:
    name: report-service MSSQL Testcontainers integration test (PR-0.5)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 15

    # PR-0.5 (2026-05) reporting platform hardening: SqlBuilder T-SQL
    # correctness coverage against a real Microsoft SQL Server 2022
    # container. Linux runners ship with Docker on /var/run/docker.sock
    # so Testcontainers picks the daemon up without overrides. The
    # `integration-tests` Maven profile flips Surefire's group filter
    # to include only @Tag("integration") classes — currently just
    # SqlBuilderMssqlIntegrationTest, WorkcubeQueryAdapterIT in this module.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install common-auth (parent reactor dependency, not in Maven Central)
        run: ./mvnw -q -pl common-auth install -DskipTests

      - name: Run report-service MSSQL Testcontainers integration tests
        run: ./mvnw -q -pl report-service test -Pintegration-tests -Dtest='SqlBuilderMssqlIntegrationTest,WorkcubeQueryAdapterIT'

  auth-service-impersonation-it:
    name: auth-service impersonation WireMock IT (Session 47 Faz 1)
    runs-on: ubuntu-latest
    needs: [full-reactor-build]
    timeout-minutes: 10

    # Codex 019e2022 strategy AGREE + REVISE-2 absorb: the WireMock IT for
    # the impersonation broker uses a *IT suffix but is run by Surefire (not
    # Failsafe) via an explicit -Dtest target. The full-reactor lane runs
    # with -DskipTests and would miss it. This lane pins:
    #   - happy_full_chain (permission-service start-session handoff)
    #   - self_impersonation_pre_resolution_emits_blocked_audit (BUG #1 IT proof)
    #   - validation_empty_reason_short_circuits (bean validation contract)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Temurin JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: 'maven'

      - name: Pre-install reactor dependencies (common-auth shared)
        run: ./mvnw -q -DskipTests install -pl common-auth -am

      - name: Run auth-service impersonation WireMock IT
        run: ./mvnw -q -pl auth-service test -Dtest='AuthImpersonationWireMockIT'

  openfga-dsl-check:
    name: OpenFGA DSL presence + line check (basic)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Faz 19.3 — fga CLI v0.6 'but not' syntax incompat; full DSL validate
    # 19.8+'da newer fga CLI ile yeniden eklenecek. Şimdilik basic presence check.
    # Authoritative validation: K8s OpenFGA StatefulSet runtime (Vault kv/platform/openfga).
    #
    # R16 PR-B (Codex 019e27f5 Option 3 + P1 absorb): fga test framework
    # introduce — canonical model `backend/openfga/model.fga`. Test fixture'lar
    # `backend/openfga/tests/*.fga.yaml`. fga CLI v0.7+ ile 'but not' compat.
    # Root model `openfga/model.fga` legacy (init.sh canonical'i yükler);
    # root vs canonical drift ayrı governance PR.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check DSL file present + size (canonical)
        run: |
          # Canonical = backend/openfga/model.fga (init.sh load source).
          test -f backend/openfga/model.fga || (echo "backend/openfga/model.fga missing!" && exit 1)
          wc -l backend/openfga/model.fga
          echo "--- first 20 lines ---"
          head -20 backend/openfga/model.fga
          echo "--- last 10 lines ---"
          tail -10 backend/openfga/model.fga

      - name: Check DSL schema marker (canonical)
        run: |
          grep -q "^model" backend/openfga/model.fga
          grep -q "^  schema" backend/openfga/model.fga
          grep -cE "^type " backend/openfga/model.fga
          echo "DSL structural check PASS"

      - name: Check required types present (R16 PR-B regression guard)
        run: |
          # R16 PR-B: type report_group artık zorunlu (Faz 2 Program 1c spec).
          # Bu check canonical model'den silinmesini engeller (close-out discipline).
          for required in "type user" "type organization" "type company" \
                          "type module" "type action" "type report" \
                          "type report_group"; do
            if ! grep -qE "^${required}$" backend/openfga/model.fga; then
              echo "::error::Required OpenFGA type missing in canonical model: ${required}"
              exit 1
            fi
            echo "✓ ${required} present in canonical model"
          done

      - name: Install fga CLI (R16 PR-B fga test framework)
        run: |
          # fga CLI v0.7+ ile 'but not' compat; Faz 19.3 incompat çözüldü.
          # Latest tag fetch (dynamic) — pinned v0.7.13+ pattern.
          FGA_VERSION=$(curl -sL "https://api.github.com/repos/openfga/cli/releases/latest" \
            | grep '"tag_name"' | head -1 | sed -E 's/.*"v([^"]+)".*/\1/')
          echo "fga CLI version (latest): ${FGA_VERSION}"
          curl -sSL -o /tmp/fga.tar.gz \
            "https://github.com/openfga/cli/releases/download/v${FGA_VERSION}/fga_${FGA_VERSION}_linux_amd64.tar.gz"
          tar -xzf /tmp/fga.tar.gz -C /tmp
          sudo mv /tmp/fga /usr/local/bin/fga
          chmod +x /usr/local/bin/fga
          fga version

      - name: Run fga model validate (canonical DSL syntactic)
        # Codex 019e27f5 PR-B P1 absorb: validate ucuz + net fail surface;
        # test'ten önce DSL syntactic kontrol.
        run: |
          fga model validate --file backend/openfga/model.fga

      - name: Run fga test (model + tuples + assertions)
        # R16 PR-B Option 3: deklaratif OpenFGA test framework — report_group
        # authz contract semantik kilidi. R15 regression guard.
        run: |
          set -e
          # Canonical tests: backend/openfga/tests/*.fga.yaml
          for test_file in backend/openfga/tests/*.fga.yaml; do
            [ -f "$test_file" ] || { echo "No fga tests found"; exit 1; }
            echo "::group::fga test ${test_file}"
            fga model test --tests "${test_file}"
            echo "::endgroup::"
          done
          echo "✓ All OpenFGA tests PASS"
