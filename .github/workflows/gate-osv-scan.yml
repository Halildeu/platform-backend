name: Dependency Scan (OSV)

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  osv-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install OSV-Scanner (pre-built binary)
        run: |
          OSV_VERSION="2.0.2"
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}/osv-scanner_linux_amd64" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner

      - name: Scan backend dependencies
        run: osv-scanner --lockfile=pom.xml
        continue-on-error: true
