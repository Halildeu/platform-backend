name: platform

x-runtime-defaults: &runtime-defaults
  restart: unless-stopped
  networks:
    - microservice-network
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-common-env: &common-env
  TZ: ${TZ:-Europe/Istanbul}

x-vault-env: &vault-env
  VAULT_URI: ${VAULT_URI:-http://vault:8200}
  VAULT_SCHEME: ${VAULT_SCHEME:-http}
  VAULT_TOKEN: ${VAULT_TOKEN}
  VAULT_FAIL_FAST: ${VAULT_FAIL_FAST:-true}

services:
  discovery-server:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-discovery-server:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8761:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-db:
    <<: *runtime-defaults
    image: pgvector/pgvector:pg18
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      <<: *common-env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-users}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./devops/postgres:/docker-entrypoint-initdb.d:ro
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-migrate:
    <<: *runtime-defaults
    image: openfga/openfga:${OPENFGA_VERSION:-v1.11.2}
    restart: "no"
    command: migrate
    environment:
      <<: *common-env
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga
    depends_on:
      postgres-db:
        condition: service_healthy

  openfga:
    <<: *runtime-defaults
    image: openfga/openfga:${OPENFGA_VERSION:-v1.11.2}
    command: run
    ports:
      - "127.0.0.1:4000:8080"
      - "127.0.0.1:4001:8081"
    environment:
      <<: *common-env
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_METRICS_ENABLED: "true"
      OPENFGA_LOG_LEVEL: ${OPENFGA_LOG_LEVEL:-info}
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    mem_limit: 256m

  permission-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-permission-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8090:8084"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${PERMISSION_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${PERMISSION_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${PERMISSION_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${PERMISSION_DB_DDL_AUTO:-validate}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      PERMISSION_DB_SCHEMA: ${PERMISSION_DB_SCHEMA:-permission_service}
      PERMISSION_SERVICE_INTERNAL_API_KEY: ${PERMISSION_SERVICE_INTERNAL_API_KEY}
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_USER_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_SECONDARY_ISSUER: ${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_SECONDARY_USER_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: permission-service,frontend,account,serban-web
      ERP_OPENFGA_ENABLED: "true"
      ERP_OPENFGA_API_URL: http://openfga:8080
      ERP_OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      ERP_OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID}
      SCOPE_CACHE_ENABLED: ${SCOPE_CACHE_ENABLED:-true}
      SCOPE_CACHE_TTL_SECONDS: ${SCOPE_CACHE_TTL_SECONDS:-120}
      SCOPE_CACHE_MAX_SIZE: ${SCOPE_CACHE_MAX_SIZE:-10000}
      AUTHZ_VERSION_ENABLED: ${AUTHZ_VERSION_ENABLED:-true}
      PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE: ${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE:-user_service.users}
      PERMISSION_AUTHZ_USER_TABLE: ${PERMISSION_AUTHZ_USER_TABLE:-user_service.users}
      PERMISSION_AUTHZ_USER_LOOKUP_BASE_URL: ${PERMISSION_AUTHZ_USER_LOOKUP_BASE_URL:-http://user-service:8089}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_started
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-auth-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${AUTH_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${AUTH_DB_DDL_AUTO:-validate}
      SECURITY_SERVICE_JWT_PRIVATE_KEY: ${AUTH_SERVICE_JWT_PRIVATE_KEY}
      SECURITY_SERVICE_JWT_PUBLIC_KEY: ${AUTH_SERVICE_JWT_PUBLIC_KEY}
      PERMISSION_SERVICE_BASE_URL: http://permission-service:8084
      USER_SERVICE_BASE_URL: http://user-service:8089
      AUTH_DB_SCHEMA: ${AUTH_DB_SCHEMA:-auth_service}
      SERVICE_CLIENT_USER_SERVICE_SECRET: ${SERVICE_CLIENT_USER_SERVICE_SECRET}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      AUTH_VERIFICATION_BASE_URL: ${AUTH_VERIFICATION_BASE_URL}
      AUTH_RESET_BASE_URL: ${AUTH_RESET_BASE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      permission-service:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-user-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8089:8089"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${USER_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${USER_DB_DDL_AUTO:-validate}
      USER_DB_SCHEMA: ${USER_DB_SCHEMA:-user_service}
      PERMISSION_SERVICE_BASE_URL: http://permission-service:8084
      SERVICE_TOKEN_MINT_URL: http://auth-service:8088/oauth2/token
      SERVICE_TOKEN_CLIENT_ID: user-service
      SERVICE_TOKEN_CLIENT_SECRET: ${SERVICE_CLIENT_USER_SERVICE_SECRET}
      SERVICE_AUTH_JWK_SET_URI: http://auth-service:8088/oauth2/jwks
      SERVICE_AUTH_ISSUER: auth-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUERS: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}},${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_AUDIENCE: user-service,frontend,account,serban-web
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      permission-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  variant-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-variant-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8091:8091"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${VARIANT_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${VARIANT_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${VARIANT_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${VARIANT_DB_DDL_AUTO:-validate}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      VARIANT_DB_SCHEMA: ${VARIANT_DB_SCHEMA:-variant_service}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: variant-service
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  core-data-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-core-data-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Dspring.security.oauth2.resourceserver.jwt.audiences=${SECURITY_JWT_AUDIENCE:-frontend,user-service,core-data-service,account} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8092"
      SPRING_DATASOURCE_URL: ${CORE_DATA_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${CORE_DATA_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${CORE_DATA_DB_PASSWORD}
      CORE_DATA_DB_SCHEMA: ${CORE_DATA_DB_SCHEMA:-core_data_service}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_AUDIENCE: ${SECURITY_JWT_AUDIENCE:-frontend,user-service,core-data-service,account}
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web}
      ERP_OPENFGA_ENABLED: "true"
      ERP_OPENFGA_API_URL: http://openfga:8080
      ERP_OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      ERP_OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID}
      SCOPE_CACHE_ENABLED: ${SCOPE_CACHE_ENABLED:-true}
      AUTHZ_VERSION_ENABLED: ${AUTHZ_VERSION_ENABLED:-true}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_started
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-api-gateway:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:${API_GATEWAY_PORT:-8082}:8080"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >-
        -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
        -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUERS: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}},${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_JWK_SET_URIS: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: user-service,permission-service,variant-service,core-data-service
      VAULT_URI: ${VAULT_URI:-}
      VAULT_SCHEME: ${VAULT_SCHEME:-https}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_FAIL_FAST: "false"
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
    depends_on:
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      permission-service:
        condition: service_healthy
      variant-service:
        condition: service_healthy
      core-data-service:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  report-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-report-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8095"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_PREFER_IP_ADDRESS: "true"
      REPORT_MSSQL_HOST: ${REPORT_MSSQL_HOST}
      REPORT_MSSQL_PORT: ${REPORT_MSSQL_PORT:-1433}
      REPORT_MSSQL_DB: ${REPORT_MSSQL_DB}
      REPORT_MSSQL_USERNAME: ${REPORT_MSSQL_USERNAME}
      REPORT_MSSQL_PASSWORD: ${REPORT_MSSQL_PASSWORD}
      REPORT_PG_HOST: ${REPORT_PG_HOST:-postgres-db}
      REPORT_PG_PORT: ${REPORT_PG_PORT:-5432}
      REPORT_PG_DB: ${REPORT_PG_DB:-users}
      REPORT_PG_USERNAME: ${REPORT_PG_USERNAME}
      REPORT_PG_PASSWORD: ${REPORT_PG_PASSWORD}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_AUDIENCE: report-service,user-service,permission-service,variant-service,core-data-service,account,frontend
      PERMISSION_SERVICE_INTERNAL_API_KEY: ${PERMISSION_SERVICE_INTERNAL_API_KEY}
      MANAGEMENT_HEALTH_DB_ENABLED: "false"
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8095/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-service:
    <<: *runtime-defaults
    profiles: ["extras"]
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-schema-service:${IMAGE_TAG:-main-stable}
    pull_policy: ${DOCKER_PULL_POLICY:-always}
    ports:
      - "127.0.0.1:8096:8096"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8096"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SCHEMA_MSSQL_HOST: ${SCHEMA_MSSQL_HOST}
      SCHEMA_MSSQL_PORT: ${SCHEMA_MSSQL_PORT:-1433}
      SCHEMA_MSSQL_DB: ${SCHEMA_MSSQL_DB}
      SCHEMA_MSSQL_USERNAME: ${SCHEMA_MSSQL_USERNAME}
      SCHEMA_MSSQL_PASSWORD: ${SCHEMA_MSSQL_PASSWORD}
      SCHEMA_DEFAULT_SCHEMA: ${SCHEMA_DEFAULT_SCHEMA}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      MANAGEMENT_HEALTH_DB_ENABLED: "false"
    depends_on:
      discovery-server:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Infrastructure: Keycloak ────────────────────────────────
  keycloak:
    <<: *runtime-defaults
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.5.5}
    command: start-dev
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    environment:
      <<: *common-env
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:?KC_ADMIN_PASSWORD must be set in env file}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_HOSTNAME:-https://ai.acik.com}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 20s
      timeout: 5s
      retries: 10

  # ── Infrastructure: Vault (prod mode — Raft storage, persistent) ──
  vault:
    <<: *runtime-defaults
    image: hashicorp/vault:${VAULT_VERSION:-1.21.4}
    cap_add:
      - IPC_LOCK
    command: vault server -config=/vault/config/vault.hcl
    ports:
      - "127.0.0.1:8200:8200"
      - "127.0.0.1:8201:8201"
    environment:
      <<: *common-env
      VAULT_ADDR: "http://127.0.0.1:8200"
      SKIP_CHOWN: "true"
      SKIP_SETCAP: "true"
    volumes:
      - vault_data:/vault/file
      - vault_logs:/vault/logs
      - ./devops/vault/vault.hcl:/vault/config/vault.hcl:ro
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  # ── Infrastructure: Vault auto-unseal ──────────────────────
  vault-unseal:
    <<: *runtime-defaults
    image: hashicorp/vault:${VAULT_VERSION:-1.21.4}
    depends_on:
      vault:
        condition: service_started
    volumes:
      - ${VAULT_UNSEAL_KEYS_DIR:-/home/halil/platform/state/vault}:/vault-keys:ro
      - ./devops/vault/prod-unseal-loop.sh:/scripts/prod-unseal-loop.sh:ro
    environment:
      VAULT_ADDR: "http://vault:8200"
      SKIP_CHOWN: "true"
    entrypoint: ["/bin/sh", "/scripts/prod-unseal-loop.sh"]
    mem_limit: 64m

  # ── Infrastructure: Vault audit log init ──────────────────
  vault-audit-init:
    <<: *runtime-defaults
    image: hashicorp/vault:${VAULT_VERSION:-1.21.4}
    restart: "no"
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - vault_logs:/vault/logs
      - ${VAULT_UNSEAL_KEYS_DIR:-/home/halil/platform/state/vault}:/vault-keys:ro
      - ./devops/vault/vault-init-audit.sh:/scripts/vault-init-audit.sh:ro
    environment:
      VAULT_ADDR: "http://vault:8200"
      SKIP_CHOWN: "true"
    entrypoint: ["/bin/sh", "/scripts/vault-init-audit.sh"]
    mem_limit: 64m

  # ── Infrastructure: Vault Raft snapshot (daily backup) ────
  vault-snapshot:
    <<: *runtime-defaults
    image: hashicorp/vault:${VAULT_VERSION:-1.21.4}
    depends_on:
      vault:
        condition: service_healthy
    volumes:
      - vault_snapshots:/vault/snapshots
      - ${VAULT_UNSEAL_KEYS_DIR:-/home/halil/platform/state/vault}:/vault-keys:ro
      - ./devops/vault/vault-raft-snapshot.sh:/scripts/vault-raft-snapshot.sh:ro
    environment:
      VAULT_ADDR: "http://vault:8200"
      SKIP_CHOWN: "true"
      SNAPSHOT_INTERVAL: "${VAULT_SNAPSHOT_INTERVAL:-86400}"
      SNAPSHOT_RETAIN: "${VAULT_SNAPSHOT_RETAIN:-7}"
    entrypoint: ["/bin/sh", "/scripts/vault-raft-snapshot.sh"]
    mem_limit: 64m

  # ── Infrastructure: Service Manager API ────────────────────
  service-manager:
    <<: *runtime-defaults
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --production && node service-manager-api.js --port 8795"
    ports:
      - "127.0.0.1:8795:8795"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8795/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Infrastructure: Nginx (frontend) ───────────────────────
  # Config generated at startup via envsubst from template.
  # Docker service names (keycloak, api-gateway) are injected — never 127.0.0.1.
  web-nginx:
    <<: *runtime-defaults
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-ai.acik.com}
      NGINX_GATEWAY_UPSTREAM: ${NGINX_GATEWAY_UPSTREAM:-http://api-gateway:8080}
      NGINX_KEYCLOAK_UPSTREAM: ${NGINX_KEYCLOAK_UPSTREAM:-http://keycloak:8080}
      NGINX_SERVICE_MANAGER_UPSTREAM: ${NGINX_SERVICE_MANAGER_UPSTREAM:-http://service-manager:8795}
    volumes:
      - ${WEB_CURRENT_LINK:-/home/halil/platform/web/current}:/usr/share/nginx/html:ro
      - ../deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${NGINX_TLS_CERT_PATH:-/dev/null}:/etc/nginx/tls/tls.crt:ro
      - ${NGINX_TLS_KEY_PATH:-/dev/null}:/etc/nginx/tls/tls.key:ro
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx-healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Observability ───────────────────────────────────────────
  loki:
    <<: *runtime-defaults
    image: grafana/loki:3.5.0
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    <<: *runtime-defaults
    image: grafana/promtail:3.5.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    mem_limit: 128m

  tempo:
    <<: *runtime-defaults
    image: grafana/tempo:2.7.2
    ports:
      - "127.0.0.1:3200:3200"
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infra/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    <<: *runtime-defaults
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./scripts/perf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ${VAULT_PROMETHEUS_TOKEN_FILE:-/dev/null}:/etc/prometheus/vault-token:ro
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    <<: *runtime-defaults
    image: grafana/grafana:12.4.1
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3010}:3000"
    environment:
      <<: *common-env
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./scripts/perf/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./scripts/perf/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/perf/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./scripts/perf/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  microservice-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
  loki_data:
  tempo_data:
  vault_data:
  vault_logs:
  vault_snapshots:
