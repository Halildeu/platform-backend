name: ${COMPOSE_PROJECT_NAME:-platform}

x-runtime-defaults: &runtime-defaults
  restart: unless-stopped
  networks:
    - microservice-network
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-common-env: &common-env
  TZ: ${TZ:-Europe/Istanbul}

x-vault-env: &vault-env
  VAULT_URI: ${VAULT_URI}
  VAULT_SCHEME: ${VAULT_SCHEME:-https}
  VAULT_TOKEN: ${VAULT_TOKEN}
  VAULT_FAIL_FAST: ${VAULT_FAIL_FAST:-true}

services:
  discovery-server:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-discovery-server:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8761:8761"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-db:
    <<: *runtime-defaults
    image: pgvector/pgvector:pg18
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      <<: *common-env
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-users}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./devops/postgres:/docker-entrypoint-initdb.d:ro
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  openfga-migrate:
    <<: *runtime-defaults
    image: openfga/openfga:latest
    restart: "no"
    command: migrate
    environment:
      <<: *common-env
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga
    depends_on:
      postgres-db:
        condition: service_healthy

  openfga:
    <<: *runtime-defaults
    image: openfga/openfga:latest
    command: run
    ports:
      - "127.0.0.1:4000:8080"
      - "127.0.0.1:4001:8081"
    environment:
      <<: *common-env
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga
      OPENFGA_PLAYGROUND_ENABLED: "false"
      OPENFGA_LOG_LEVEL: ${OPENFGA_LOG_LEVEL:-info}
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    mem_limit: 256m

  permission-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-permission-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8090:8084"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${PERMISSION_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${PERMISSION_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${PERMISSION_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${PERMISSION_DB_DDL_AUTO:-validate}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      PERMISSION_DB_SCHEMA: ${PERMISSION_DB_SCHEMA:-permission_service}
      PERMISSION_SERVICE_INTERNAL_API_KEY: ${PERMISSION_SERVICE_INTERNAL_API_KEY}
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_USER_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_SECONDARY_ISSUER: ${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_SECONDARY_USER_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: permission-service,frontend,account,serban-web
      ERP_OPENFGA_ENABLED: "true"
      ERP_OPENFGA_API_URL: http://openfga:8080
      ERP_OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      ERP_OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID}
      PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE: ${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE:-user_service.users}
      PERMISSION_AUTHZ_USER_TABLE: ${PERMISSION_AUTHZ_USER_TABLE:-user_service.users}
      PERMISSION_AUTHZ_USER_LOOKUP_BASE_URL: ${PERMISSION_AUTHZ_USER_LOOKUP_BASE_URL:-http://user-service:8089}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_started
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-auth-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${AUTH_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${AUTH_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${AUTH_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${AUTH_DB_DDL_AUTO:-validate}
      SECURITY_SERVICE_JWT_PRIVATE_KEY: ${AUTH_SERVICE_JWT_PRIVATE_KEY}
      SECURITY_SERVICE_JWT_PUBLIC_KEY: ${AUTH_SERVICE_JWT_PUBLIC_KEY}
      PERMISSION_SERVICE_BASE_URL: http://permission-service:8084
      USER_SERVICE_BASE_URL: http://user-service:8089
      AUTH_DB_SCHEMA: ${AUTH_DB_SCHEMA:-auth_service}
      SERVICE_CLIENT_USER_SERVICE_SECRET: ${SERVICE_CLIENT_USER_SERVICE_SECRET}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      AUTH_VERIFICATION_BASE_URL: ${AUTH_VERIFICATION_BASE_URL}
      AUTH_RESET_BASE_URL: ${AUTH_RESET_BASE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      permission-service:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  user-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-user-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8089:8089"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${USER_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${USER_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${USER_DB_DDL_AUTO:-validate}
      USER_DB_SCHEMA: ${USER_DB_SCHEMA:-user_service}
      PERMISSION_SERVICE_BASE_URL: http://permission-service:8084
      SERVICE_TOKEN_MINT_URL: http://auth-service:8088/oauth2/token
      SERVICE_TOKEN_CLIENT_ID: user-service
      SERVICE_TOKEN_CLIENT_SECRET: ${SERVICE_CLIENT_USER_SERVICE_SECRET}
      SERVICE_AUTH_JWK_SET_URI: http://auth-service:8088/oauth2/jwks
      SERVICE_AUTH_ISSUER: auth-service
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUERS: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}},${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_AUDIENCE: user-service,frontend,account,serban-web
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      permission-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  variant-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-variant-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8091:8091"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SPRING_DATASOURCE_URL: ${VARIANT_SERVICE_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${VARIANT_SERVICE_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${VARIANT_SERVICE_DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${VARIANT_DB_DDL_AUTO:-validate}
      EUREKA_SERVER_URL: http://discovery-server:8761/eureka
      VARIANT_DB_SCHEMA: ${VARIANT_DB_SCHEMA:-variant_service}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: variant-service
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  core-data-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-core-data-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8092:8092"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8092"
      SPRING_DATASOURCE_URL: ${CORE_DATA_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${CORE_DATA_DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${CORE_DATA_DB_PASSWORD}
      CORE_DATA_DB_SCHEMA: ${CORE_DATA_DB_SCHEMA:-core_data_service}
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      CORE_DATA_SECURITY_JWT_AUDIENCE: frontend,user-service,core-data-service
      ERP_OPENFGA_ENABLED: "true"
      ERP_OPENFGA_API_URL: http://openfga:8080
      ERP_OPENFGA_STORE_ID: ${OPENFGA_STORE_ID}
      ERP_OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_started
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-api-gateway:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:${API_GATEWAY_PORT:-8082}:8080"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: >-
        -XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0
        -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUERS: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}},${KEYCLOAK_ISSUER_URI}
      SECURITY_JWT_JWK_SET_URIS: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_AUDIENCE: user-service,permission-service,variant-service,core-data-service
      VAULT_URI: ${VAULT_URI:-}
      VAULT_SCHEME: ${VAULT_SCHEME:-https}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_FAIL_FAST: "false"
      SECURITY_AUTH_ALLOWED_CLIENT_IDS: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account}
    depends_on:
      discovery-server:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy
      permission-service:
        condition: service_healthy
      variant-service:
        condition: service_healthy
      core-data-service:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  report-service:
    <<: *runtime-defaults
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-report-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8095:8095"
    environment:
      <<: [*common-env, *vault-env]
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8095"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      EUREKA_PREFER_IP_ADDRESS: "true"
      REPORT_MSSQL_HOST: ${REPORT_MSSQL_HOST}
      REPORT_MSSQL_PORT: ${REPORT_MSSQL_PORT:-1433}
      REPORT_MSSQL_DB: ${REPORT_MSSQL_DB}
      REPORT_MSSQL_USERNAME: ${REPORT_MSSQL_USERNAME}
      REPORT_MSSQL_PASSWORD: ${REPORT_MSSQL_PASSWORD}
      REPORT_PG_HOST: ${REPORT_PG_HOST:-postgres-db}
      REPORT_PG_PORT: ${REPORT_PG_PORT:-5432}
      REPORT_PG_DB: ${REPORT_PG_DB:-users}
      REPORT_PG_USERNAME: ${REPORT_PG_USERNAME}
      REPORT_PG_PASSWORD: ${REPORT_PG_PASSWORD}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      SECURITY_JWT_AUDIENCE: report-service,user-service,permission-service,variant-service,core-data-service,account,frontend
      PERMISSION_SERVICE_INTERNAL_API_KEY: ${PERMISSION_SERVICE_INTERNAL_API_KEY}
      MANAGEMENT_HEALTH_DB_ENABLED: "false"
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8095/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-service:
    <<: *runtime-defaults
    profiles: ["extras"]
    image: ghcr.io/${GHCR_OWNER}/platform-ssot-schema-service:${IMAGE_TAG:-main-stable}
    pull_policy: always
    ports:
      - "127.0.0.1:8096:8096"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=60.0 -XX:InitialRAMPercentage=20.0 -Dspring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_PUBLIC_ISSUER_URI} -Dspring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWKS_URI} -Deureka.client.service-url.defaultZone=http://discovery-server:8761/eureka"
      SERVER_PORT: "8096"
      EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://discovery-server:8761/eureka
      SCHEMA_MSSQL_HOST: ${SCHEMA_MSSQL_HOST}
      SCHEMA_MSSQL_PORT: ${SCHEMA_MSSQL_PORT:-1433}
      SCHEMA_MSSQL_DB: ${SCHEMA_MSSQL_DB}
      SCHEMA_MSSQL_USERNAME: ${SCHEMA_MSSQL_USERNAME}
      SCHEMA_MSSQL_PASSWORD: ${SCHEMA_MSSQL_PASSWORD}
      SCHEMA_DEFAULT_SCHEMA: ${SCHEMA_DEFAULT_SCHEMA}
      SECURITY_JWT_JWK_SET_URI: ${KEYCLOAK_JWKS_URI}
      SECURITY_JWT_ISSUER: ${KEYCLOAK_PUBLIC_ISSUER_URI:-${KEYCLOAK_ISSUER_URI}}
      MANAGEMENT_HEALTH_DB_ENABLED: "false"
    depends_on:
      discovery-server:
        condition: service_healthy
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Infrastructure: Keycloak ────────────────────────────────
  keycloak:
    <<: *runtime-defaults
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION:-26.5.5}
    command: start-dev
    ports:
      - "127.0.0.1:${KEYCLOAK_PORT:-8080}:8080"
    environment:
      <<: *common-env
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_HOSTNAME:-https://ai.acik.com}
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080"]
      interval: 20s
      timeout: 5s
      retries: 10

  # ── Infrastructure: Vault ──────────────────────────────────
  vault:
    <<: *runtime-defaults
    image: hashicorp/vault:${VAULT_VERSION:-1.19}
    cap_add:
      - IPC_LOCK
    command: server -dev
    ports:
      - "127.0.0.1:8200:8200"
    environment:
      <<: *common-env
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    mem_limit: 256m
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Infrastructure: Service Manager API ────────────────────
  service-manager:
    <<: *runtime-defaults
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --production && node service-manager-api.js --port 8795"
    ports:
      - "127.0.0.1:8795:8795"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/app
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8795/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Infrastructure: Nginx (frontend) ───────────────────────
  web-nginx:
    <<: *runtime-defaults
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ${WEB_CURRENT_LINK:-/home/halil/platform/web/current}:/usr/share/nginx/html:ro
      - ${NGINX_CONFIG_PATH:-/home/halil/platform/web/nginx/default.conf}:/etc/nginx/conf.d/default.conf:ro
      - ${NGINX_TLS_CERT_PATH:-/dev/null}:/etc/nginx/tls/tls.crt:ro
      - ${NGINX_TLS_KEY_PATH:-/dev/null}:/etc/nginx/tls/tls.key:ro
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/nginx-healthz"]
      interval: 15s
      timeout: 3s
      retries: 3

networks:
  microservice-network:
    driver: bridge

volumes:
  postgres_data:
  keycloak_data:
