spring:
  datasource:
    # Per-context unique H2 URL (defense in depth — @IsolatedH2DataJpaTest
    # also overrides this via ApplicationContextInitializer). The
    # ${random.uuid} fallback gives a fresh schema per Spring context boot
    # so a sibling class's ddl-auto=create-drop cannot drop the current
    # context's schema regardless of execution order.
    url: jdbc:h2:mem:meeting-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: false
