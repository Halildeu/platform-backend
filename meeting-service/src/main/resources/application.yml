spring:
  threads:
    virtual:
      enabled: true
  application:
    name: meeting-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${MEETING_DB_URL:jdbc:postgresql://localhost:5432/meeting}}
    username: ${SPRING_DATASOURCE_USERNAME:${MEETING_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MEETING_DB_PASSWORD:postgres}}
  data:
    redis:
      host: ${MEETING_REDIS_HOST:localhost}
      port: ${MEETING_REDIS_PORT:6379}
      username: ${MEETING_REDIS_USERNAME:}
      password: ${MEETING_REDIS_PASSWORD:}
      ssl:
        enabled: ${MEETING_REDIS_SSL_ENABLED:false}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${MEETING_DB_SCHEMA:meeting_service}
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    table: meeting_flyway_history
    default-schema: ${MEETING_DB_SCHEMA:meeting_service}
    schemas: ${MEETING_DB_SCHEMA:meeting_service}
    locations: ${MEETING_FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8097}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:127.0.0.1}
    instance-id: ${spring.application.name}:${eureka.instance.hostname}:${server.port}

security:
  analysis-job-capability:
    hmac-secret: ${ANALYSIS_JOB_CAPABILITY_HMAC_SECRET:}
    issuer: ${ANALYSIS_JOB_CAPABILITY_ISSUER:transcript-service}
    audience: ${ANALYSIS_JOB_CAPABILITY_AUDIENCE:meeting-service}
    client-id: ${ANALYSIS_JOB_CAPABILITY_CLIENT_ID:meeting-ai}
    max-ttl: ${ANALYSIS_JOB_CAPABILITY_MAX_TTL:PT30M}
  jwt:
    audience: ${SECURITY_JWT_AUDIENCE:meeting-service,frontend,account,serban-web}
    allowed-client-ids: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web,account}

meeting:
  tenant:
    local-default-tenant-id: ${MEETING_LOCAL_DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}
  authz:
    object-principal:
      # Migration-only switches. Production defaults remain fail-closed on the
      # stable OIDC subject; GitOps may enable these for a bounded rollback window.
      legacy-user-id-fallback-enabled: ${MEETING_AUTHZ_LEGACY_USER_ID_FALLBACK_ENABLED:false}
      legacy-user-id-dual-write-enabled: ${MEETING_AUTHZ_LEGACY_USER_ID_DUAL_WRITE_ENABLED:false}
  ai:
    enabled: ${MEETING_AI_ENABLED:false}
    base-url: ${MEETING_AI_BASE_URL:http://localhost:18080}
    analyze-path: ${MEETING_AI_ANALYZE_PATH:/analyze}
    request-timeout: ${MEETING_AI_REQUEST_TIMEOUT:30s}
    max-transcript-chars: ${MEETING_AI_MAX_TRANSCRIPT_CHARS:200000}
  retention:
    meeting-intelligence-days: ${MEETING_RETENTION_INTELLIGENCE_DAYS:730}
    cleanup-cron: ${MEETING_RETENTION_CLEANUP_CRON:0 31 2 * * *}
    cleanup-batch-size: ${MEETING_RETENTION_CLEANUP_BATCH_SIZE:1000}
    cleanup-max-batches-per-run: ${MEETING_RETENTION_CLEANUP_MAX_BATCHES_PER_RUN:100}
  events:
    redis:
      # Publisher + poller form one rollout unit. Both are default-off and a
      # mismatch fails startup before any retry budget can be consumed.
      enabled: ${MEETING_EVENTS_REDIS_ENABLED:false}
      stream-key: ${MEETING_EVENTS_REDIS_STREAM_KEY:meeting:events}
    outbox:
      poller:
        enabled: ${MEETING_EVENTS_OUTBOX_POLLER_ENABLED:false}
      scheduling-enabled: ${MEETING_EVENTS_OUTBOX_SCHEDULING_ENABLED:true}
      poll-delay-ms: ${MEETING_EVENTS_OUTBOX_POLL_DELAY_MS:5000}
      batch-size: ${MEETING_EVENTS_OUTBOX_BATCH_SIZE:100}
      lease-duration-ms: ${MEETING_EVENTS_OUTBOX_LEASE_DURATION_MS:60000}
      max-attempts: ${MEETING_EVENTS_OUTBOX_MAX_ATTEMPTS:8}
      owner: ${MEETING_EVENTS_OUTBOX_OWNER:}
  internal:
    # ai#244 BE-1b — auth-service SERVICE-token trust for the internal
    # analysis-result ingestion path (/api/v1/internal/meetings/**). A BLANK
    # jwk-set-uri ⇒ FAIL-CLOSED: the secondary (service) JWT decoder is not
    # built, no service-issuer token can decode, and the SVC_ authority the
    # internal chain requires is never minted. Client IDs are an exact CSV
    # allowlist; a blank list while JWKS is enabled fails application startup.
    service-jwt:
      jwk-set-uri: ${MEETING_INTERNAL_SERVICE_JWT_JWK_SET_URI:}
      issuer: ${MEETING_INTERNAL_SERVICE_JWT_ISSUER:auth-service}
      audience: ${MEETING_INTERNAL_SERVICE_JWT_AUDIENCE:meeting-service}
      client-ids: ${MEETING_INTERNAL_SERVICE_JWT_CLIENT_IDS:}

management:
  health:
    redis:
      enabled: ${MEETING_REDIS_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
