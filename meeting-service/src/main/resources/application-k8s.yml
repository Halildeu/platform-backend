spring:
  application:
    name: meeting-service
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  data:
    redis:
      host: ${MEETING_REDIS_HOST:redis}
      port: ${MEETING_REDIS_PORT:6379}
      username: ${MEETING_REDIS_USERNAME:}
      password: ${MEETING_REDIS_PASSWORD:}
      ssl:
        enabled: ${MEETING_REDIS_SSL_ENABLED:false}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
          audiences: ${SECURITY_JWT_AUDIENCE:meeting-service,frontend,account,serban-web}

# OpenFGA live config — same shape as endpoint-admin-service application-k8s.yml.
#
# Authz behaviour (source-verified against EndpointAdminRequireModuleInterceptor
# pattern reused here as MeetingRequireModuleInterceptor):
#  - enabled=false → @RequireModule interceptor fail-OPEN no-op
#    (`!authzService.isEnabled() → return true`); authz gate silently off.
#  - enabled=true + store/model BLANK → OpenFgaStartupGuard logs a SECURITY
#    WARNING; check() fails at call time. Guard WARNS only; does NOT block start.
#    Production: enabled=true + valid store/model required.
#
# Reference: ADR-0012-EA — OpenFGA tuple writer is permission-service
# (DD-EA-2 boundary). meeting-service writes owner tuples ONLY on create of a
# meeting it owns (Zanzibar ReBAC owner/participant/viewer); all reads go
# through check(). The seed of the `module:MEETING` instance + relations lives
# in gitops bootstrap/openfga (prod path: permission-service writer, ADR-0041 §5).
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:false}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    check-cache-ttl-seconds: ${ERP_OPENFGA_CHECK_CACHE_TTL_SECONDS:10}

meeting:
  tenant:
    local-default-tenant-id: ${MEETING_LOCAL_DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}
  authz:
    object-principal:
      # Explicit, time-bounded migration controls. Keep false outside the
      # stable-sub rollout/backfill window.
      legacy-user-id-fallback-enabled: ${MEETING_AUTHZ_LEGACY_USER_ID_FALLBACK_ENABLED:false}
      legacy-user-id-dual-write-enabled: ${MEETING_AUTHZ_LEGACY_USER_ID_DUAL_WRITE_ENABLED:false}
  ai:
    enabled: ${MEETING_AI_ENABLED:true}
    base-url: ${MEETING_AI_BASE_URL:http://meeting-ai-service:8080}
    analyze-path: ${MEETING_AI_ANALYZE_PATH:/analyze}
    request-timeout: ${MEETING_AI_REQUEST_TIMEOUT:30s}
    max-transcript-chars: ${MEETING_AI_MAX_TRANSCRIPT_CHARS:200000}
  events:
    redis:
      enabled: ${MEETING_EVENTS_REDIS_ENABLED:false}
      stream-key: ${MEETING_EVENTS_REDIS_STREAM_KEY:meeting:events}
    outbox:
      poller:
        enabled: ${MEETING_EVENTS_OUTBOX_POLLER_ENABLED:false}
      scheduling-enabled: ${MEETING_EVENTS_OUTBOX_SCHEDULING_ENABLED:true}
      poll-delay-ms: ${MEETING_EVENTS_OUTBOX_POLL_DELAY_MS:5000}
      batch-size: ${MEETING_EVENTS_OUTBOX_BATCH_SIZE:100}
      lease-duration-ms: ${MEETING_EVENTS_OUTBOX_LEASE_DURATION_MS:60000}
      max-attempts: ${MEETING_EVENTS_OUTBOX_MAX_ATTEMPTS:8}
      owner: ${MEETING_EVENTS_OUTBOX_OWNER:}
  internal:
    # ai#244 BE-1b — auth-service SERVICE-token trust for the internal
    # analysis-result ingestion path (/api/v1/internal/meetings/**). A BLANK
    # jwk-set-uri ⇒ FAIL-CLOSED: the secondary (service) JWT decoder is not
    # built, no service-issuer token can decode, and the SVC_ authority the
    # internal chain requires is never minted. BE-1c wires the ingestion caller
    # (meeting-ai-service) and transcript session resolution both use this
    # decoder. Client IDs are an exact CSV allowlist; a blank list while JWKS is
    # enabled fails application startup.
    service-jwt:
      jwk-set-uri: ${MEETING_INTERNAL_SERVICE_JWT_JWK_SET_URI:}
      issuer: ${MEETING_INTERNAL_SERVICE_JWT_ISSUER:auth-service}
      audience: ${MEETING_INTERNAL_SERVICE_JWT_AUDIENCE:meeting-service}
      client-ids: ${MEETING_INTERNAL_SERVICE_JWT_CLIENT_IDS:}

server:
  port: ${SERVER_PORT:8097}

management:
  health:
    redis:
      enabled: ${MEETING_REDIS_HEALTH_ENABLED:false}
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
