spring:
  threads:
    virtual:
      enabled: true
  application:
    name: transcript-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${TRANSCRIPT_DB_URL:jdbc:postgresql://localhost:5432/transcript}}
    username: ${SPRING_DATASOURCE_USERNAME:${TRANSCRIPT_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${TRANSCRIPT_DB_PASSWORD:postgres}}
  data:
    redis:
      host: ${TRANSCRIPT_REDIS_HOST:localhost}
      port: ${TRANSCRIPT_REDIS_PORT:6379}
      username: ${TRANSCRIPT_REDIS_USERNAME:}
      password: ${TRANSCRIPT_REDIS_PASSWORD:}
      ssl:
        enabled: ${TRANSCRIPT_REDIS_SSL_ENABLED:false}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${TRANSCRIPT_DB_SCHEMA:transcript_service}
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    table: transcript_flyway_history
    default-schema: ${TRANSCRIPT_DB_SCHEMA:transcript_service}
    schemas: ${TRANSCRIPT_DB_SCHEMA:transcript_service}
    locations: ${TRANSCRIPT_FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8098}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:127.0.0.1}
    instance-id: ${spring.application.name}:${eureka.instance.hostname}:${server.port}

security:
  analysis-job-capability:
    hmac-secret: ${ANALYSIS_JOB_CAPABILITY_HMAC_SECRET:}
    issuer: ${ANALYSIS_JOB_CAPABILITY_ISSUER:transcript-service}
    audience: ${ANALYSIS_JOB_CAPABILITY_AUDIENCE:meeting-service}
    client-id: ${ANALYSIS_JOB_CAPABILITY_CLIENT_ID:meeting-ai}
    ttl: ${ANALYSIS_JOB_CAPABILITY_TTL:PT15M}
  jwt:
    audience: ${SECURITY_JWT_AUDIENCE:transcript-service,frontend,account,serban-web}
    allowed-client-ids: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web,account}

transcript:
  internal:
    service-jwt:
      jwk-set-uri: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_JWK_SET_URI:}
      issuer: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_ISSUER:auth-service}
      audience: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_AUDIENCE:transcript-service}
      client-ids: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_CLIENT_IDS:meeting-ai}
  tenant:
    local-default-tenant-id: ${TRANSCRIPT_LOCAL_DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}
  retention:
    transcript-records-days: ${TRANSCRIPT_RETENTION_RECORDS_DAYS:365}
    access-audit-days: ${TRANSCRIPT_RETENTION_ACCESS_AUDIT_DAYS:730}
    cleanup-cron: ${TRANSCRIPT_RETENTION_CLEANUP_CRON:0 23 2 * * *}
    cleanup-batch-size: ${TRANSCRIPT_RETENTION_CLEANUP_BATCH_SIZE:1000}
    cleanup-max-batches-per-run: ${TRANSCRIPT_RETENTION_CLEANUP_MAX_BATCHES_PER_RUN:100}
  export:
    # Hard cap on rows materialized into a single CSV/Excel export (DoS + memory
    # guard). Export beyond this is rejected 400.
    max-rows: ${TRANSCRIPT_EXPORT_MAX_ROWS:50000}
  search:
    # Default + max page size for the segment list/search endpoints.
    default-page-size: ${TRANSCRIPT_SEARCH_DEFAULT_PAGE_SIZE:50}
    max-page-size: ${TRANSCRIPT_SEARCH_MAX_PAGE_SIZE:200}
  direct-stt-result-consumer:
    # DEFAULT-OFF: stream carries transcript text, so activation is an explicit
    # runtime decision after direct-STT mTLS/audit gates pass.
    enabled: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_ENABLED:false}
    dlq-stream-key: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_DLQ_STREAM_KEY:transcript:direct-stt-results:dlq}
    stream:
      key: ${TRANSCRIPT_DIRECT_STT_RESULT_STREAM_KEY:transcript:direct-stt-results}
    group:
      name: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_GROUP_NAME:transcript-service-v1}
      consumer: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_INSTANCE_NAME:${HOSTNAME:transcript-service-1}}
    poll:
      batch-size: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_BATCH_SIZE:32}
      block-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_BLOCK_MILLIS:2000}
      error-backoff-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_ERROR_BACKOFF_MILLIS:1000}
      claim-min-idle-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_CLAIM_MIN_IDLE_MILLIS:60000}
      claim-batch-size: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_CLAIM_BATCH_SIZE:32}
    mapping:
      # Separate activation gate: enabling stream ingestion without a canonical
      # resolver remains fail-closed and exhausts into the metadata-only DLQ.
      enabled: ${TRANSCRIPT_MEETING_SESSION_RESOLVER_ENABLED:false}
      meeting-service-base-url: ${TRANSCRIPT_MEETING_SERVICE_BASE_URL:http://meeting-service:8097}
      token-url: ${TRANSCRIPT_MEETING_SERVICE_TOKEN_URL:http://auth-service:8088/oauth2/token}
      client-id: ${TRANSCRIPT_MEETING_SERVICE_CLIENT_ID:transcript-service}
      client-secret: ${TRANSCRIPT_MEETING_SERVICE_CLIENT_SECRET:}
      connect-timeout-millis: ${TRANSCRIPT_MEETING_SESSION_CONNECT_TIMEOUT_MILLIS:2000}
      response-timeout-millis: ${TRANSCRIPT_MEETING_SESSION_RESPONSE_TIMEOUT_MILLIS:3000}
      max-attempts: ${TRANSCRIPT_MEETING_SESSION_MAX_ATTEMPTS:8}
      initial-backoff-millis: ${TRANSCRIPT_MEETING_SESSION_INITIAL_BACKOFF_MILLIS:5000}
      max-backoff-millis: ${TRANSCRIPT_MEETING_SESSION_MAX_BACKOFF_MILLIS:300000}
      claim-lease-millis: ${TRANSCRIPT_MEETING_SESSION_CLAIM_LEASE_MILLIS:30000}
      reconciliation-batch-size: ${TRANSCRIPT_MEETING_SESSION_RECONCILIATION_BATCH_SIZE:50}
      reconciliation-poll-millis: ${TRANSCRIPT_MEETING_SESSION_RECONCILIATION_POLL_MILLIS:30000}
  finalization:
    recording-finished-consumer:
      enabled: ${TRANSCRIPT_RECORDING_FINISHED_CONSUMER_ENABLED:false}
      stream-key: ${TRANSCRIPT_RECORDING_FINISHED_STREAM_KEY:meeting:events}
      dlq-stream-key: ${TRANSCRIPT_RECORDING_FINISHED_DLQ_STREAM_KEY:meeting:events:transcript-finalization:dlq}
      group-name: ${TRANSCRIPT_RECORDING_FINISHED_GROUP_NAME:transcript-finalization-v1}
      consumer-name: ${TRANSCRIPT_RECORDING_FINISHED_CONSUMER_NAME:${HOSTNAME:transcript-service-1}}
      batch-size: ${TRANSCRIPT_RECORDING_FINISHED_BATCH_SIZE:32}
      block-millis: ${TRANSCRIPT_RECORDING_FINISHED_BLOCK_MILLIS:2000}
      error-backoff-millis: ${TRANSCRIPT_RECORDING_FINISHED_ERROR_BACKOFF_MILLIS:1000}
      claim-min-idle-millis: ${TRANSCRIPT_RECORDING_FINISHED_CLAIM_MIN_IDLE_MILLIS:60000}
      claim-batch-size: ${TRANSCRIPT_RECORDING_FINISHED_CLAIM_BATCH_SIZE:32}
    worker:
      enabled: ${TRANSCRIPT_FINALIZATION_WORKER_ENABLED:false}
      poll-delay-ms: ${TRANSCRIPT_FINALIZATION_WORKER_POLL_DELAY_MS:5000}
      batch-size: ${TRANSCRIPT_FINALIZATION_WORKER_BATCH_SIZE:50}
    timing:
      quiescence: ${TRANSCRIPT_FINALIZATION_QUIESCENCE:PT1M}
      min-wait: ${TRANSCRIPT_FINALIZATION_MIN_WAIT:PT6M}
      max-wait: ${TRANSCRIPT_FINALIZATION_MAX_WAIT:PT15M}
  events:
    redis:
      # Producer outbox remains durable while transport is disabled. Enabling
      # this and the poller is one coordinated runtime rollout gate. A mismatch
      # fails application startup before the poller can consume retry budget.
      enabled: ${TRANSCRIPT_MEETING_EVENTS_REDIS_ENABLED:false}
      stream-key: ${TRANSCRIPT_MEETING_EVENTS_REDIS_STREAM_KEY:meeting:events}
    outbox:
      poller:
        enabled: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_POLLER_ENABLED:false}
      scheduling-enabled: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_SCHEDULING_ENABLED:true}
      poll-delay-ms: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_POLL_DELAY_MS:5000}
      batch-size: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_BATCH_SIZE:100}
      lease-duration-ms: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_LEASE_DURATION_MS:60000}
      max-attempts: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_MAX_ATTEMPTS:8}
      retry-delay-ms: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_RETRY_DELAY_MS:5000}
      owner: ${TRANSCRIPT_MEETING_EVENTS_OUTBOX_OWNER:}

management:
  health:
    redis:
      # Redis is optional while the direct-STT result consumer is default-off.
      enabled: ${TRANSCRIPT_REDIS_HEALTH_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
