spring:
  application:
    name: transcript-service
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  data:
    redis:
      host: ${TRANSCRIPT_REDIS_HOST:redis-streams}
      port: ${TRANSCRIPT_REDIS_PORT:6379}
      username: ${TRANSCRIPT_REDIS_USERNAME:}
      password: ${TRANSCRIPT_REDIS_PASSWORD:}
      ssl:
        enabled: ${TRANSCRIPT_REDIS_SSL_ENABLED:false}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
          audiences: ${SECURITY_JWT_AUDIENCE:transcript-service,frontend,account,serban-web}

security:
  analysis-job-capability:
    hmac-secret: ${ANALYSIS_JOB_CAPABILITY_HMAC_SECRET:}
    issuer: ${ANALYSIS_JOB_CAPABILITY_ISSUER:transcript-service}
    audience: ${ANALYSIS_JOB_CAPABILITY_AUDIENCE:meeting-service}
    client-id: ${ANALYSIS_JOB_CAPABILITY_CLIENT_ID:meeting-ai}
    ttl: ${ANALYSIS_JOB_CAPABILITY_TTL:PT15M}

# OpenFGA live config (mirrors endpoint-admin-service).
#  - enabled=false → @RequireModule interceptor fail-OPEN no-op (authz gate
#    silently disabled; pod stays green).
#  - enabled=true + store/model blank → OpenFgaStartupGuard logs a SECURITY
#    WARNING; check() fails at call time. Guard only WARNS; does NOT block start.
#    Production: enabled=true + valid store/model required.
#
# Reference: ADR-0012-EA — the OpenFGA tuple writer is ONLY permission-service
# (DD-EA-2 boundary); transcript-service is a consumer, never writes tuples.
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:false}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    check-cache-ttl-seconds: ${ERP_OPENFGA_CHECK_CACHE_TTL_SECONDS:10}

server:
  port: ${SERVER_PORT:8098}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}
  health:
    redis:
      enabled: ${TRANSCRIPT_REDIS_HEALTH_ENABLED:false}

transcript:
  internal:
    service-jwt:
      jwk-set-uri: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_JWK_SET_URI:}
      issuer: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_ISSUER:auth-service}
      audience: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_AUDIENCE:transcript-service}
      client-ids: ${TRANSCRIPT_INTERNAL_SERVICE_JWT_CLIENT_IDS:meeting-ai}
  direct-stt-result-consumer:
    enabled: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_ENABLED:false}
    dlq-stream-key: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_DLQ_STREAM_KEY:transcript:direct-stt-results:dlq}
    stream:
      key: ${TRANSCRIPT_DIRECT_STT_RESULT_STREAM_KEY:transcript:direct-stt-results}
    group:
      name: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_GROUP_NAME:transcript-service-v1}
      consumer: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_INSTANCE_NAME:${HOSTNAME:transcript-service-1}}
    poll:
      batch-size: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_BATCH_SIZE:32}
      block-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_BLOCK_MILLIS:2000}
      error-backoff-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_ERROR_BACKOFF_MILLIS:1000}
      claim-min-idle-millis: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_CLAIM_MIN_IDLE_MILLIS:60000}
      claim-batch-size: ${TRANSCRIPT_DIRECT_STT_RESULT_CONSUMER_CLAIM_BATCH_SIZE:32}
  finalization:
    recording-finished-consumer:
      enabled: ${TRANSCRIPT_RECORDING_FINISHED_CONSUMER_ENABLED:false}
      stream-key: ${TRANSCRIPT_RECORDING_FINISHED_STREAM_KEY:meeting:events}
      dlq-stream-key: ${TRANSCRIPT_RECORDING_FINISHED_DLQ_STREAM_KEY:meeting:events:transcript-finalization:dlq}
      group-name: ${TRANSCRIPT_RECORDING_FINISHED_GROUP_NAME:transcript-finalization-v1}
      consumer-name: ${TRANSCRIPT_RECORDING_FINISHED_CONSUMER_NAME:${HOSTNAME:transcript-service-1}}
    worker:
      enabled: ${TRANSCRIPT_FINALIZATION_WORKER_ENABLED:false}
      poll-delay-ms: ${TRANSCRIPT_FINALIZATION_WORKER_POLL_DELAY_MS:5000}
      batch-size: ${TRANSCRIPT_FINALIZATION_WORKER_BATCH_SIZE:50}
    timing:
      quiescence: ${TRANSCRIPT_FINALIZATION_QUIESCENCE:PT1M}
      min-wait: ${TRANSCRIPT_FINALIZATION_MIN_WAIT:PT6M}
      max-wait: ${TRANSCRIPT_FINALIZATION_MAX_WAIT:PT15M}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
