spring:
  datasource:
    # Per-context unique H2 URL (mirrors endpoint-admin-service). Tests annotated
    # with @IsolatedH2DataJpaTest override this via an ApplicationContextInitializer
    # (see com.example.transcript.testsupport.IsolatedH2DataJpaTest). Tests that
    # forget the meta-annotation still fall back to a UUID-suffixed URL via
    # Spring's ${random.uuid}, resolved per Spring context boot — so a sibling
    # class's ddl-auto=create-drop cannot drop the current context's schema
    # regardless of execution order.
    url: jdbc:h2:mem:transcript-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        default_schema: public
        format_sql: false
  flyway:
    enabled: false

logging:
  level:
    org.hibernate.SQL: WARN
