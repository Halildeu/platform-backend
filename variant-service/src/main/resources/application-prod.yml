spring:
  config:
    import: optional:vault://secret/${VAULT_SECRET_PREFIX:stage}/db/${spring.application.name}
  cloud:
    vault:
      enabled: true
      authentication: ${VAULT_AUTH_METHOD:TOKEN}
      token: ${VAULT_TOKEN:}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
        app-role-path: approle
      kv:
        enabled: true
        backend: secret
      uri: ${VAULT_URI:https://vault:8200}
      scheme: ${VAULT_SCHEME:http}
      fail-fast: ${VAULT_FAIL_FAST:true}
      ssl:
        trust-store: ${VAULT_TRUSTSTORE:}
        trust-store-type: PEM
