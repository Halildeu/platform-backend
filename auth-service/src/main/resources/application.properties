# src/main/resources/application.properties

# Varsayılan olarak 'local' profilini aktif et.
spring.profiles.active=local

# Virtual Threads (Loom) — Java 21
spring.threads.virtual.enabled=true

# --- ORTAK AYARLAR ---
spring.application.name=auth-service
server.port=8088

# Vault (prod/test profilleri application-prod.yml & application-test.yml ile yüklenir)

# JWT Ayarları
jwt.secret=${JWT_SECRET:change-me}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.issuer=auth-service

# Permission Service Ayarları
permission.service.base-url=${PERMISSION_SERVICE_BASE_URL:http://permission-service}
permission.audit-mirror.base-url=${PERMISSION_AUDIT_MIRROR_BASE_URL:${PERMISSION_SERVICE_BASE_URL:http://permission-service}}
permission.audit-mirror.enabled=${PERMISSION_AUDIT_MIRROR_ENABLED:true}
permission.audit-mirror.internal-api-key=${PERMISSION_SERVICE_INTERNAL_API_KEY:}
user.service.base-url=${USER_SERVICE_BASE_URL:http://user-service}

security.service-token.audience=${SERVICE_TOKEN_AUDIENCE:permission-service}
security.service-token.ttl-seconds=${SERVICE_TOKEN_TTL_SECONDS:60}
security.service-token.permissions=${SERVICE_TOKEN_PERMISSIONS:permissions:read}
security.service-token.environment=${SERVICE_TOKEN_ENV:local}

security.service-jwt.private-key=${AUTH_SERVICE_JWT_PRIVATE_KEY:${vault.jwt.auth-service.privateKey:}}
security.service-jwt.public-key=${AUTH_SERVICE_JWT_PUBLIC_KEY:${vault.jwt.auth-service.publicKey:}}
security.service-jwt.key-id=${SERVICE_JWT_KEY_ID:service-jwt-key}

# Mint endpoint client registration. Secret values come from Vault/ESO in k8s.
# Audience/permission policy is client-local; the global mint policy below is an
# additional upper ceiling, not a substitute for client authorization.
security.service-clients.clients.user-service.secret=${SERVICE_CLIENT_USER_SERVICE_SECRET:}
security.service-clients.clients.user-service.allowed-audiences=permission-service,user-service,notification-orchestrator
security.service-clients.clients.user-service.allowed-permissions=permissions:read,permissions:write,users:internal,notify:intents:system
security.service-clients.clients.user-service.require-explicit-permissions=false
security.service-clients.clients.meeting-ai.secret=${SERVICE_CLIENT_MEETING_AI_SECRET:}
security.service-clients.clients.meeting-ai.allowed-audiences=meeting-service,transcript-service
security.service-clients.clients.meeting-ai.allowed-permissions=meeting:analysis-result:write,transcript:canonical:read
security.service-clients.clients.meeting-ai.allowed-permissions-by-audience[meeting-service]=meeting:analysis-result:write
security.service-clients.clients.meeting-ai.allowed-permissions-by-audience[transcript-service]=transcript:canonical:read
security.service-clients.clients.meeting-ai.require-explicit-permissions=true
security.service-clients.clients.transcript-service.secret=${SERVICE_CLIENT_TRANSCRIPT_SERVICE_SECRET:}
security.service-clients.clients.transcript-service.allowed-audiences=meeting-service
security.service-clients.clients.transcript-service.allowed-permissions=meeting:session:resolve
security.service-clients.clients.transcript-service.require-explicit-permissions=true

# Mint policy (allowlist + basit rate limit)
# P1.8 (STORY-0320): canonical service-token path unblock — user-service
# audience + users:internal permission allowlist'e eklendi. Canary setup
# script artık Hybrid B manuel seed yerine auth-service mint ile
# user-service internal + permission-service role admin token'larını
# bölünmüş flow ile alabilir.
# #734: user-service also mints a notification-orchestrator-audience token with
# notify:intents:system for the internal admin-email system-submit path.
security.service-mint.allowed-audiences=permission-service,user-service,notification-orchestrator,meeting-service,transcript-service
security.service-mint.allowed-permissions=permissions:read,permissions:write,users:internal,notify:intents:system,meeting:analysis-result:write,meeting:session:resolve,transcript:canonical:read
security.service-mint.rate-limit-per-minute=120
security.service-mint.failed-auth-rate-limit-per-minute=${SECURITY_SERVICE_MINT_FAILED_AUTH_RATE_LIMIT:30}

# Veri tabanı ayarları — Vault (prod) ya da env (k8s)
spring.datasource.url=${SPRING_DATASOURCE_URL:${vault.db.auth-service.url:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${vault.db.auth-service.user:}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${vault.db.auth-service.password:}}
spring.jpa.hibernate.ddl-auto=${AUTH_DB_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=${AUTH_DB_SCHEMA:public}

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=${AUTH_FLYWAY_LOCATIONS:classpath:db/migration}
spring.flyway.table=auth_flyway_history
spring.flyway.default-schema=${AUTH_DB_SCHEMA:public}
spring.flyway.schemas=${AUTH_DB_SCHEMA:public}

auth.tokens.verification-ttl=${AUTH_VERIFICATION_TTL:PT24H}
auth.tokens.password-reset-ttl=${AUTH_PASSWORD_RESET_TTL:PT1H}
auth.tokens.verification-base-url=${AUTH_VERIFICATION_BASE_URL:http://localhost:3000/verify-email}
auth.tokens.reset-base-url=${AUTH_RESET_BASE_URL:http://localhost:3000/reset-password}

# Actuator & Health Check Ayarları
management.endpoints.web.exposure.include=health,info

# Eureka Client Ayarları (ortak olanlar)
eureka.client.healthcheck.enabled=true
eureka.instance.health-check-url-path=/actuator/health

# Logging Ayarları
logging.level.org.springframework.security=DEBUG
spring.security.debug=${SPRING_SECURITY_DEBUG:false}

# Dev fallback (ADMIN için varsayılan izinler) varsayılan olarak kapalıdır.
security.admin-fallback.enabled=${SECURITY_ADMIN_FALLBACK_ENABLED:false}
