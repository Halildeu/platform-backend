spring:
  application:
    name: endpoint-admin-service
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
          audiences: ${SECURITY_JWT_AUDIENCE:endpoint-admin-service,frontend,account,serban-web}

# Faz 22.1.1 BE-009 — OpenFGA live config (Codex 019de00f revize AGREE;
# provenance + davranış düzeltme: gitops #1265, 2026-06-04).
#
# Authz davranışı (kaynak-doğrulanmış, eski yorum yanlıştı):
#  - enabled=false → @RequireModule interceptor fail-OPEN no-op'tur
#    (EndpointAdminRequireModuleInterceptor: `!authzService.isEnabled()
#    → return true`); authz gate sessizce kapanır (pod yeşil kalır).
#  - enabled=true + store/model BLANK → OpenFgaStartupGuard bir SECURITY
#    WARNING loglar, check() çağrı anında başarısız olur. Guard yalnızca
#    UYARIR; startup'ı BLOKLAMAZ (önceki "yoksa start fail" iddiası hatalı).
#    Production: enabled=true + geçerli store/model zorunlu.
#
# Provenance (gitops, #1265 sonrası):
#  - ERP_OPENFGA_ENABLED + ERP_OPENFGA_API_URL → base ConfigMap
#    (kustomize/base/apps/endpoint-admin-service/configmap.yaml).
#  - ERP_OPENFGA_STORE_ID + ERP_OPENFGA_MODEL_ID → test overlay ConfigMap
#    patch (kustomize/overlays/test/kustomization.yaml); endpoint-admin'in
#    PINNED model'i, paylaşımlı kv/platform/openfga ESO'su DEĞİL. Önceki
#    "configmap overlay set eder" yorumu base'de bu key'ler yokken
#    stale/yanlıştı (canlı ConfigMap drift'i taşıyordu) — #1265 ile kapatıldı.
#
# Reference: ADR-0012-EA OpenFGA tuple writer YALNIZ permission-service
# (DD-EA-2 boundary); endpoint-admin-service consumer'dır, tuple yazmaz.
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:false}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    check-cache-ttl-seconds: ${ERP_OPENFGA_CHECK_CACHE_TTL_SECONDS:10}

# Faz 22.3 (Codex 019e6dc9 P0-B) + Faz 22 #1497 (ADR-0029 §2.5 reconciliation,
# Codex 019f0056): mTLS trust model.
#
# CANONICAL = TLS passthrough (`endpoint-admin.mtls.passthrough`, below): the
# backend terminates mTLS on its own connector and identity comes from the
# VERIFIED client cert in the TLS handshake — no forwardable header is trusted.
# This is the ONLY go-live path (ADR-0029 §2.5; 22.6 gRPC bridge clientAuth=REQUIRE;
# 22.6 operator REST reads the servlet X509 attribute, not a header).
#
# forward-header below is a NON-CANONICAL, default-OFF lab fallback for an edge
# that terminates mTLS and forwards the client cert PEM via `X-Client-Cert`
# (NGINX `ssl_client_escaped_cert` / Envoy `forward_client_cert_details`). It is
# CLIENT-SPOOFABLE unless the edge is a hardened trust boundary: the edge MUST
# strip any inbound `X-Client-Cert` and `X-Tenant-Id`, and the backend MUST be
# unreachable off-edge (NetPol). It is NEVER a go-live path. Default OFF in EVERY
# profile (#1497 flip true->false) so a direct service call cannot spoof an
# enrollment; an explicit lab overlay must opt in. forward-header and passthrough
# are mutually exclusive — startup FAILS if both on (MtlsPassthroughValidator).
endpoint-admin:
  mtls:
    forward-header:
      enabled: ${ENDPOINT_ADMIN_MTLS_FORWARD_HEADER_ENABLED:false}
    # Faz 22.5 Step-2 (ADR-0029 #1501, Codex 019ec0f9): CANONICAL passthrough
    # mTLS. Default OFF -> zero runtime impact until an activation overlay sets
    # `enabled=true` TOGETHER WITH `forward-header.enabled=false` (mutually
    # exclusive — startup FAILS if both on). On the mTLS connector X-Tenant-Id is
    # IGNORED (the L4 SNI edge cannot strip/inject it); tenant = `fixed-tenant-id`
    # (single-company deployment authority, NOT multi-tenant). Keystore/truststore
    # are mounted secret files; truststore holds ONLY the endpoint-machine issuing
    # CA. Prod activation additionally gated on revocation (CRL/OCSP) + DNS subhost.
    passthrough:
      enabled: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_ENABLED:false}
      port: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_PORT:8443}
      fixed-tenant-id: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_FIXED_TENANT_ID:}
      key-store: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_KEY_STORE:}
      key-store-password: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_KEY_STORE_PASSWORD:}
      key-store-type: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_KEY_STORE_TYPE:PKCS12}
      trust-store: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_TRUST_STORE:}
      trust-store-password: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_TRUST_STORE_PASSWORD:}
      trust-store-type: ${ENDPOINT_ADMIN_MTLS_PASSTHROUGH_TRUST_STORE_TYPE:PKCS12}

server:
  port: ${SERVER_PORT:8096}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
