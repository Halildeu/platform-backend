spring:
  threads:
    virtual:
      enabled: true
  application:
    name: endpoint-admin-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${ENDPOINT_ADMIN_DB_URL:jdbc:postgresql://localhost:5432/endpoint_admin}}
    username: ${SPRING_DATASOURCE_USERNAME:${ENDPOINT_ADMIN_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${ENDPOINT_ADMIN_DB_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${ENDPOINT_ADMIN_DB_SCHEMA:endpoint_admin_service}
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    # BE-016 transition baseline for existing ddl-auto endpoint_admin schemas;
    # fresh empty schemas still run V1-V4. Override per-env with
    # SPRING_FLYWAY_BASELINE_VERSION if a cluster needs a different cut point.
    baseline-version: 4
    table: endpoint_admin_flyway_history
    default-schema: ${ENDPOINT_ADMIN_DB_SCHEMA:endpoint_admin_service}
    schemas: ${ENDPOINT_ADMIN_DB_SCHEMA:endpoint_admin_service}
    locations: ${ENDPOINT_ADMIN_FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8096}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:127.0.0.1}
    instance-id: ${spring.application.name}:${eureka.instance.hostname}:${server.port}

security:
  jwt:
    audience: ${SECURITY_JWT_AUDIENCE:endpoint-admin-service,frontend,account,serban-web}
    allowed-client-ids: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web,account}

endpoint-admin:
  enrollment:
    default-token-ttl-minutes: ${ENDPOINT_ADMIN_ENROLLMENT_DEFAULT_TOKEN_TTL_MINUTES:1440}
    max-token-ttl-minutes: ${ENDPOINT_ADMIN_ENROLLMENT_MAX_TOKEN_TTL_MINUTES:10080}
    token-pepper: ${ENDPOINT_ADMIN_ENROLLMENT_TOKEN_PEPPER:}
    consume-rate-limit-per-minute: ${ENDPOINT_ADMIN_ENROLLMENT_CONSUME_RATE_LIMIT_PER_MINUTE:5}
  secrets:
    encryption-key: ${ENDPOINT_ADMIN_SECRET_ENCRYPTION_KEY:}
    encryption-key-version: ${ENDPOINT_ADMIN_SECRET_ENCRYPTION_KEY_VERSION:local-v1}
    rotation-grace-hours: ${ENDPOINT_ADMIN_SECRET_ROTATION_GRACE_HOURS:24}
  agent-auth:
    timestamp-window-seconds: ${ENDPOINT_ADMIN_AGENT_AUTH_TIMESTAMP_WINDOW_SECONDS:300}
    nonce-ttl-seconds: ${ENDPOINT_ADMIN_AGENT_AUTH_NONCE_TTL_SECONDS:600}
    nonce-cleanup-interval-ms: ${ENDPOINT_ADMIN_AGENT_AUTH_NONCE_CLEANUP_INTERVAL_MS:600000}
    nonce-cleanup-initial-delay-ms: ${ENDPOINT_ADMIN_AGENT_AUTH_NONCE_CLEANUP_INITIAL_DELAY_MS:600000}
  # Faz 22.6 #2290 — device-staleness reconciler. Demotes silently-broken /
  # genuinely-offline devices out of false-ONLINE: ONLINE -> STALE past stale-ttl
  # (the platform's heartbeat-freshness-ttl), STALE -> OFFLINE past offline-ttl.
  # A returning heartbeat self-heals it back to ONLINE.
  device-staleness:
    stale-ttl: ${ENDPOINT_ADMIN_DEVICE_STALENESS_STALE_TTL:PT5M}
    offline-ttl: ${ENDPOINT_ADMIN_DEVICE_STALENESS_OFFLINE_TTL:PT30M}
    reconcile-interval-ms: ${ENDPOINT_ADMIN_DEVICE_STALENESS_RECONCILE_INTERVAL_MS:60000}
    reconcile-initial-delay-ms: ${ENDPOINT_ADMIN_DEVICE_STALENESS_RECONCILE_INITIAL_DELAY_MS:60000}
  commands:
    claim-ttl-seconds: ${ENDPOINT_ADMIN_COMMAND_CLAIM_TTL_SECONDS:300}
  rollout-failure:
    github-escalation:
      # #527 §9.4 live issue POST. Disabled by default: the GET preview remains
      # available, but POST returns 503 until an operator supplies the GitHub
      # token/config through secrets/env. The token must never be logged.
      enabled: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_ESCALATION_ENABLED:false}
      api-base-url: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_API_BASE_URL:https://api.github.com}
      owner: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_OWNER:}
      repo: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_REPO:}
      token: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_TOKEN:}
      user-agent: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_USER_AGENT:platform-endpoint-admin-fdq/1.0}
      connect-timeout: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_CONNECT_TIMEOUT:PT5S}
      read-timeout: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_READ_TIMEOUT:PT10S}
      max-response-bytes: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_GITHUB_MAX_RESPONSE_BYTES:65536}
    heartbeat-stale:
      # #527 slice-2b — autonomous heartbeat-staleness queue ingest.
      # Reads latest endpoint_heartbeats rows, not endpoint_devices.last_seen_at,
      # and creates advisory SERVICE_HMAC_MODE queue items only when schema-valid
      # heartbeat evidence is present. This does not enable rollout-gating.
      enabled: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_HEARTBEAT_STALE_ENABLED:true}
      stale-after: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_HEARTBEAT_STALE_AFTER:PT24H}
      batch-size: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_HEARTBEAT_STALE_BATCH_SIZE:100}
      scan-interval-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_HEARTBEAT_STALE_SCAN_INTERVAL_MS:900000}
      initial-delay-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_HEARTBEAT_STALE_INITIAL_DELAY_MS:300000}
    cert-identity:
      # #527 CERT_IDENTITY autonomous ingest.
      # Reads backend-owned endpoint_machine_certs and endpoint_enrollments state
      # only; skips tenant-mismatched/device-less rows fail-closed and emits
      # advisory queue items through the same redacted evidence allowlist. This
      # does not enable rollout-gating.
      enabled: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_CERT_IDENTITY_ENABLED:true}
      batch-size: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_CERT_IDENTITY_BATCH_SIZE:100}
      scan-interval-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_CERT_IDENTITY_SCAN_INTERVAL_MS:900000}
      initial-delay-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_CERT_IDENTITY_INITIAL_DELAY_MS:360000}
    dns-edge-mtls:
      # #527 DNS_EDGE_MTLS autonomous ingest from AG-038 diagnostics.
      # Uses only strict-allowlisted backendDNSReachable/backendTLSValid +
      # one-way configHash evidence. Does not fabricate mTLS peer-cert data and
      # does not infer EDR/firewall root cause from generic timeouts.
      enabled: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_DNS_EDGE_MTLS_ENABLED:true}
      batch-size: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_DNS_EDGE_MTLS_BATCH_SIZE:100}
      scan-interval-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_DNS_EDGE_MTLS_SCAN_INTERVAL_MS:900000}
      initial-delay-ms: ${ENDPOINT_ADMIN_ROLLOUT_FAILURE_DNS_EDGE_MTLS_INITIAL_DELAY_MS:420000}
  uninstall:
    # AG-028 Phase 1b (Faz 22.5.6) — feature flag for the managed uninstall
    # surface. Default FALSE so the routes return 503 in dark mode and ship
    # off-by-default. Flip TRUE per overlay once Phase 2 (agent
    # UNINSTALL_SOFTWARE adapter + ProbeState) lands and the LIVE acceptance
    # smoke is green.
    enabled: ${ENDPOINT_ADMIN_UNINSTALL_ENABLED:false}
    # ISO-8601 duration. Agent heartbeat fresher than this TTL is required at
    # approve time; older → 424 FAILED_DEPENDENCY (retryable, non-terminal).
    heartbeat-freshness-ttl: ${ENDPOINT_ADMIN_UNINSTALL_HEARTBEAT_FRESHNESS_TTL:PT5M}
    # The capability the agent must advertise in its latest heartbeat
    # payload's `capabilities` array (Phase 2 lands the agent-side write).
    # Missing → 422 retryable.
    required-capability: ${ENDPOINT_ADMIN_UNINSTALL_REQUIRED_CAPABILITY:UNINSTALL_SOFTWARE}
  uninstalls:
    max-redacted-bytes: ${ENDPOINT_ADMIN_UNINSTALLS_MAX_REDACTED_BYTES:8192}
    max-summary-bytes: ${ENDPOINT_ADMIN_UNINSTALLS_MAX_SUMMARY_BYTES:2048}
  backup-dryrun:
    # Faz 22.8A.3a (#648) — managed-root registry + (later 22.8A.3b) issuing
    # surface for the privacy-sensitive backup dry-run. Default FALSE so the
    # routes return 503 in dark mode and ship off-by-default. Even when TRUE,
    # the per-tenant allow-list is EMPTY by default → every tenant gets 403
    # until explicitly opted in (double-gated, fail-closed).
    enabled: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_ENABLED:false}
    # Comma-separated tenant UUIDs allowed to use the surface. Empty → none.
    allowed-tenant-ids: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_ALLOWED_TENANT_IDS:}
    # 22.8A.3b issuing surface gates (Codex 019ec45e):
    # heartbeat fresher than this TTL is required at approve; older → 424.
    heartbeat-freshness-ttl: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_HEARTBEAT_FRESHNESS_TTL:PT5M}
    # capability the agent must advertise in its latest heartbeat (missing → 422).
    required-capability: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_REQUIRED_CAPABILITY:COLLECT_BACKUP_DRYRUN}
    # bounded TTL on the dispatched command (no null expiry — stale approved scope must not run).
    command-ttl: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_COMMAND_TTL:PT30M}
    # scope cap: max managed roots per request.
    max-roots: ${ENDPOINT_ADMIN_BACKUP_DRYRUN_MAX_ROOTS:32}
  tenant:
    local-default-tenant-id: ${ENDPOINT_ADMIN_LOCAL_DEFAULT_TENANT_ID:00000000-0000-0000-0000-000000000001}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
