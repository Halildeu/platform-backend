# audio-gateway-service — Faz 24 Meeting Intelligence
# 3-AI mutabakat Codex 019e879c + Mavis msg 78 AGREE.

spring:
  application:
    name: audio-gateway-service
  data:
    redis:
      # Keep blocking XADD/XREAD calls below the transcript delivery attempt
      # deadline so a cancelled Reactor task cannot retain a native Redis call.
      timeout: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_DELIVERY_ATTEMPT_TIMEOUT_MS:2000}ms
  threads:
    virtual:
      enabled: true
  cloud:
    discovery:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Overlay env var: AUDIO_GATEWAY_JWT_ISSUER_URI
          issuer-uri: ${AUDIO_GATEWAY_JWT_ISSUER_URI:http://localhost:8080/realms/dev-local}

server:
  port: 8210
  shutdown: graceful

management:
  endpoint:
    health:
      probes:
        enabled: true
  # Redis health indicator default KAPALI: starter-data-redis classpath'te
  # (PR-gw-01C dispatcher) ama default dispatcher mode=noop — Redis yokken
  # aggregate health DOWN olmasın. Redis mode'da k8s overlay
  # AUDIO_GATEWAY_HEALTH_REDIS_ENABLED=true ile açar (application-k8s.yml).
  health:
    redis:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

# Audio Gateway contract limits (Codex 019e879c bounds + 019e8846 iter-1 + 019e8c26 iter-2 ADR-0031 absorb)
audio:
  gateway:
    contract:
      version: "1.0"
    bounds:
      # ADR-0031 + Codex 019e8c26 iter-2: chunk 256 KB (1 MB pre-PoC overshoot stale),
      # session 60 dk (120 dk pre-PoC stale). Configurable env override.
      max-chunk-bytes: 262144        # 256 KB per chunk
      max-buffered-seconds: 30
      max-session-minutes: 60        # 60 dk max session
      session-expiry-sweep-ms: 30000 # abandoned-session cleanup cadence
      admission-queue-capacity: 1000
      # Bounded in-memory session registry (PR-gw-01A persistence iddiası YOK;
      # durability sonraki slice PR-gw-01C Redis Streams ile gelir).
      max-active-sessions: 1000
    # Codex `019e8df2` iter-2 AGREE PR-gw-01B3 — dispatcher canonical port (old stt.dispatch-mode retired)
    dispatcher:
      mode: noop                     # noop | redis (PR-gw-01C cross-server Streams producer)
      queue-full-retry-after-seconds: 5
      unavailable-retry-after-seconds: 30
    # Faz 24 issue #182 — direct HTTP forward gateway→live-stt /transcribe (architecture "A":
    # Codex 019eeb45 + Claude AGREE; impl contract hardened by Codex 019eeb5f REVISE absorb).
    # DEFAULT-OFF: DirectSttForwardingDispatcher bean is not registered until enabled=true;
    # when on, it decorates the mode-selected base dispatcher (Redis metadata path preserved)
    # and best-effort/bounded fire-and-forward audio to transcribe-url. Raw audio NEVER
    # persisted/logged; transcript text NEVER logged.
    direct-stt:
      enabled: false                 # opt-in; overlay flips true once live-stt /transcribe reachable
      transcribe-url: ""             # e.g. https://10.99.0.2:8000/transcribe (WireGuard+mTLS, ADR-0031 D2). Required when enabled.
      max-in-flight: 32              # bounded concurrent forwards; saturation → drop (best-effort), admission unaffected
      connect-timeout-ms: 3000
      response-timeout-ms: 30000     # GPU /transcribe can take hundreds of ms to seconds
      max-response-bytes: 262144     # small JSON response decode cap
      aggregation:
        enabled: true                # #231: aggregate PCM16 before Whisper; memory-only, no persistence
        window-seconds: 5            # configurable fixed window; accepted range 5..30 seconds
        max-buffered-sessions: 64    # bounds raw PCM held in gateway memory
      tls:
        enabled: false               # real cross-server meeting audio flips true with Caddy/Vault PKI mTLS (ADR-0031/B+ I7)
        ca-certificate-path: ""      # mounted PEM CA bundle for live-stt.denetim/Caddy server verification
        client-certificate-path: ""  # mounted PEM client cert presented by audio-gateway
        client-private-key-path: ""  # mounted PEM private key; never log/copy to Redis
      transcript-result-stream:
        enabled: false               # opt-in; writes transcript text to result stream after live-stt returns
        stream-key: transcript:direct-stt-results
        max-len: 0                   # 0 = no producer trim; consumer/retention owns lifecycle
        read-batch-size: 50          # max events emitted to one client per poll/SSE tick
        read-max-scan: 500           # max Redis entries scanned to skip unrelated sessions
        poll-interval-ms: 1000       # SSE bridge poll cadence
        heartbeat-interval-ms: 15000 # SSE keepalive cadence
        delivery-attempt-timeout-ms: 2000 # bound one blocking XADD attempt
        delivery-total-timeout-ms: 15000  # release audio/in-flight permits after retry budget
      streaming:
        enabled: false               # #184 default-off authenticated gateway WebSocket bridge
        stream-url: ""               # ws(s)://live-stt.../ws/stream; required when enabled
        max-frame-bytes: 65535        # uint16 frame length bound; PCM16 only
        max-terminal-control-bytes: 64 # only strict {"type":"eof"} is accepted as client text
        terminal-drain-timeout-ms: 10000 # bound while waiting for relayed drained event
        source-history-max-bytes: 4194304 # bounded PCM history for exact final source ranges
    jwt:
      # 3-AI mutabakat Codex 019e8846 iter-1: tenant/user claim adı configurable;
      # backend canonical pattern (common-auth/AuthenticatedUserLookupService) "companyId" + "userId".
      # Absent claim → fail-closed 403 (sessiz "unknown" YASAK).
      tenant-claim: companyId
      user-claim: userId
    # Local/dev default: disabled so contract tests do not require a live meeting-service.
    # k8s profile enables this by default and fails session start closed when the canonical
    # meeting-service UUID cannot be read with the caller's JWT.
    meeting-access:
      validation-enabled: false
      base-url: http://localhost:8097
      connect-timeout-ms: 2000
      response-timeout-ms: 3000
      max-response-bytes: 32768
    idempotency:
      # Codex 019e8c26 iter-2 AGREE: Idempotency-Key header canonical;
      # 16-128 char (UUIDv4 tavsiye, zorunlu değil); scope tenantId+userId+method+route+key.
      header-name: Idempotency-Key
      min-length: 16
      max-length: 128
      # Bounded LRU cache for idempotency-key replay window (memory-only PR-gw-01A).
      replay-cache-size: 4096
    # Faz 24 KVKK audit pipeline (gitops#1249). This is part of the canonical
    # audio.gateway.* typed contract but remains independent of chunk dispatch.
    audit:
      redis:
        # DEFAULT-OFF: NoOpAudioGatewayAuditSink stays the bean. Flip true per
        # overlay once audit-event-consumer-service is deployed.
        enabled: false
        stream-key: audit:events
        # 0 = no producer-side trim; durable consumer owns source-entry deletion.
        max-len: 0

logging:
  level:
    com.example.audiogateway: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{correlationId:-}] %logger{36} - %msg%n"
