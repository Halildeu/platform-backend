# k8s overlay — testai.acik.com + ai.acik.com Keycloak realm
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Dual-URI pattern (endpoint-admin emsali): issuer external (token iss
          # claim'i edge host'u taşır), JWKS internal (cluster içi keycloak
          # Service — default-deny egress dışarı 443'e izin vermez; key fetch
          # in-cluster kalır). İkisi birlikte set → Boot jwk-set-uri'den key
          # çeker + issuer-uri ile iss claim validation yapar.
          issuer-uri: ${AUDIO_GATEWAY_JWT_ISSUER_URI:http://platform-keycloak:8080/realms/platform}
          jwk-set-uri: ${AUDIO_GATEWAY_JWT_JWKS_URI:http://keycloak:8080/realms/platform-test/protocol/openid-connect/certs}

management:
  health:
    redis:
      # redis dispatcher mode'da true set edilir (configmap) — aggregate
      # /actuator/health Redis reachability'yi yansıtır (D29 Functional).
      # Liveness/readiness probe group'ları etkilenmez (state-based).
      enabled: ${AUDIO_GATEWAY_HEALTH_REDIS_ENABLED:false}

audio:
  gateway:
    dispatcher:
      mode: ${AUDIO_GATEWAY_DISPATCHER_MODE:noop}
      queue-full-retry-after-seconds: ${AUDIO_GATEWAY_DISPATCHER_QUEUE_FULL_RETRY_AFTER_SECONDS:5}
      unavailable-retry-after-seconds: ${AUDIO_GATEWAY_DISPATCHER_UNAVAILABLE_RETRY_AFTER_SECONDS:30}
    bounds:
      max-chunk-bytes: ${AUDIO_GATEWAY_MAX_CHUNK_BYTES:1048576}
      max-buffered-seconds: ${AUDIO_GATEWAY_MAX_BUFFERED_SECONDS:30}
      max-session-minutes: ${AUDIO_GATEWAY_MAX_SESSION_MINUTES:120}
      admission-queue-capacity: ${AUDIO_GATEWAY_QUEUE_CAPACITY:1000}
    jwt:
      tenant-claim: ${AUDIO_GATEWAY_JWT_TENANT_CLAIM:companyId}
      user-claim: ${AUDIO_GATEWAY_JWT_USER_CLAIM:userId}
