# k8s overlay — testai.acik.com + ai.acik.com Keycloak realm
spring:
  data:
    redis:
      # Uses the same bound as one transcript delivery attempt; the outer total
      # deadline still owns retries and release of connection-local audio.
      timeout: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_DELIVERY_ATTEMPT_TIMEOUT_MS:2000}ms
  security:
    oauth2:
      resourceserver:
        jwt:
          # Dual-URI pattern (endpoint-admin emsali): issuer external (token iss
          # claim'i edge host'u taşır), JWKS internal (cluster içi keycloak
          # Service — default-deny egress dışarı 443'e izin vermez; key fetch
          # in-cluster kalır). İkisi birlikte set → Boot jwk-set-uri'den key
          # çeker + issuer-uri ile iss claim validation yapar.
          #
          # Default YOK (Codex 019eb709 REVISE absorb): her overlay/configmap iki
          # env'i de açıkça verir; eksikse startup placeholder-resolution hatasıyla
          # fail-fast eder — yanlış realm'e sessiz düşme YASAK (gitops
          # OVERLAY_MUST_OVERRIDE felsefesiyle aynı fail-closed disiplin).
          issuer-uri: ${AUDIO_GATEWAY_JWT_ISSUER_URI}
          jwk-set-uri: ${AUDIO_GATEWAY_JWT_JWKS_URI}

# Faz 24 (#716, cross-AI 019ee16b) — shared-realm authz hardening, DEFAULT-OFF.
# Migration-safe (mappers-first): audience+role protocol mappers are deployed to legit
# recorder clients and tokens verified (runbook steps 1-3 DONE for platform-desktop)
# BEFORE these flip to true at enforce time (step 7). Enforce-first would 401 in-flight
# tokens. resource-client-id = required aud value + resource_access roles key.
audio-gateway:
  security:
    resource-client-id: ${AUDIO_GATEWAY_SECURITY_RESOURCE_CLIENT_ID:audio-gateway-service}
    enforce-audience: ${AUDIO_GATEWAY_SECURITY_ENFORCE_AUDIENCE:false}
    require-audio-record-role: ${AUDIO_GATEWAY_SECURITY_REQUIRE_AUDIO_RECORD_ROLE:false}

management:
  server:
    # k8s'te actuator ayrı management portunda (tüm Spring servislerle aynı
    # topoloji — drift gate spring-actuator probe contract'ı management:8081
    # şart koşar; gitops scripts/drift_detection/lib/probe_contract_rules.py).
    # Ayrı Netty server: WebFlux security chain ana porttan ayrışır, kubelet
    # probe'ları auth'suz erişir.
    port: 8081
  health:
    redis:
      # redis dispatcher mode'da true set edilir (configmap) — aggregate
      # /actuator/health Redis reachability'yi yansıtır (D29 Functional).
      # Liveness/readiness probe group'ları etkilenmez (state-based).
      enabled: ${AUDIO_GATEWAY_HEALTH_REDIS_ENABLED:false}

audio:
  gateway:
    dispatcher:
      mode: ${AUDIO_GATEWAY_DISPATCHER_MODE:noop}
      queue-full-retry-after-seconds: ${AUDIO_GATEWAY_DISPATCHER_QUEUE_FULL_RETRY_AFTER_SECONDS:5}
      unavailable-retry-after-seconds: ${AUDIO_GATEWAY_DISPATCHER_UNAVAILABLE_RETRY_AFTER_SECONDS:30}
    bounds:
      max-chunk-bytes: ${AUDIO_GATEWAY_MAX_CHUNK_BYTES:1048576}
      max-buffered-seconds: ${AUDIO_GATEWAY_MAX_BUFFERED_SECONDS:30}
      max-session-minutes: ${AUDIO_GATEWAY_MAX_SESSION_MINUTES:120}
      session-expiry-sweep-ms: ${AUDIO_GATEWAY_SESSION_EXPIRY_SWEEP_MS:30000}
      admission-queue-capacity: ${AUDIO_GATEWAY_QUEUE_CAPACITY:1000}
    jwt:
      tenant-claim: ${AUDIO_GATEWAY_JWT_TENANT_CLAIM:companyId}
      user-claim: ${AUDIO_GATEWAY_JWT_USER_CLAIM:userId}
    meeting-access:
      validation-enabled: ${AUDIO_GATEWAY_MEETING_ACCESS_VALIDATION_ENABLED:true}
      base-url: ${AUDIO_GATEWAY_MEETING_SERVICE_BASE_URL:http://meeting-service:8097}
      connect-timeout-ms: ${AUDIO_GATEWAY_MEETING_SERVICE_CONNECT_TIMEOUT_MS:2000}
      response-timeout-ms: ${AUDIO_GATEWAY_MEETING_SERVICE_RESPONSE_TIMEOUT_MS:3000}
      max-response-bytes: ${AUDIO_GATEWAY_MEETING_SERVICE_MAX_RESPONSE_BYTES:32768}
    direct-stt:
      aggregation:
        enabled: ${AUDIO_GATEWAY_DIRECT_STT_AGGREGATION_ENABLED:true}
        window-seconds: ${AUDIO_GATEWAY_DIRECT_STT_AGGREGATION_WINDOW_SECONDS:5}
        max-buffered-sessions: ${AUDIO_GATEWAY_DIRECT_STT_AGGREGATION_MAX_BUFFERED_SESSIONS:64}
      transcript-result-stream:
        enabled: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_ENABLED:false}
        stream-key: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_KEY:transcript:direct-stt-results}
        max-len: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_MAX_LEN:0}
        read-batch-size: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_READ_BATCH_SIZE:50}
        read-max-scan: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_READ_MAX_SCAN:500}
        poll-interval-ms: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_POLL_INTERVAL_MS:1000}
        heartbeat-interval-ms: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_HEARTBEAT_INTERVAL_MS:15000}
        delivery-attempt-timeout-ms: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_DELIVERY_ATTEMPT_TIMEOUT_MS:2000}
        delivery-total-timeout-ms: ${AUDIO_GATEWAY_DIRECT_STT_TRANSCRIPT_RESULT_STREAM_DELIVERY_TOTAL_TIMEOUT_MS:15000}
      streaming:
        enabled: ${AUDIO_GATEWAY_DIRECT_STT_STREAMING_ENABLED:false}
        stream-url: ${AUDIO_GATEWAY_DIRECT_STT_STREAM_URL:}
        max-frame-bytes: ${AUDIO_GATEWAY_DIRECT_STT_STREAM_MAX_FRAME_BYTES:65535}
        max-terminal-control-bytes: ${AUDIO_GATEWAY_DIRECT_STT_STREAM_MAX_TERMINAL_CONTROL_BYTES:64}
        terminal-drain-timeout-ms: ${AUDIO_GATEWAY_DIRECT_STT_STREAM_TERMINAL_DRAIN_TIMEOUT_MS:10000}
        source-history-max-bytes: ${AUDIO_GATEWAY_DIRECT_STT_STREAM_SOURCE_HISTORY_MAX_BYTES:4194304}
    # Faz 24 KVKK audit pipeline (gitops#1249). DEFAULT-OFF; overlay configmap
    # flips it once audit-event-consumer-service is up.
    audit:
      redis:
        enabled: ${AUDIO_GATEWAY_AUDIT_REDIS_ENABLED:false}
        stream-key: ${AUDIO_GATEWAY_AUDIT_STREAM_KEY:audit:events}
        max-len: ${AUDIO_GATEWAY_AUDIT_STREAM_MAX_LEN:0}
