spring:
  application:
    name: notification-orchestrator
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notify_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
      minimum-idle: 2
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        default_schema: ${NOTIFY_DB_SCHEMA:notify}
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    default-schema: ${NOTIFY_DB_SCHEMA:notify}
    schemas: ${NOTIFY_DB_SCHEMA:notify}
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8089}
  shutdown: graceful

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

notify:
  outbox:
    poll-interval-ms: ${NOTIFY_OUTBOX_POLL_INTERVAL_MS:5000}
    batch-size: 50
  retry:
    max-attempts: ${NOTIFY_RETRY_MAX_ATTEMPTS:5}
    backoff-initial-ms: ${NOTIFY_RETRY_BACKOFF_INITIAL_MS:30000}
    backoff-multiplier: ${NOTIFY_RETRY_BACKOFF_MULTIPLIER:2.5}
  audit:
    retention-days: ${NOTIFY_AUDIT_RETENTION_DAYS:90}
  idempotency:
    window-hours: ${NOTIFY_IDEMPOTENCY_WINDOW_HOURS:24}
  dedupe:
    window-minutes: ${NOTIFY_DEDUPE_WINDOW_MINUTES:5}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    com.serban.notify: ${LOGGING_LEVEL_COM_SERBAN_NOTIFY:INFO}
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{correlation_id:-NONE}] %-40.40logger{39} : %m%n"
