spring:
  threads:
    virtual:
      enabled: true
  application:
    name: core-data-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:${CORE_DATA_DB_URL:jdbc:postgresql://localhost:5432/users}}
    username: ${SPRING_DATASOURCE_USERNAME:${CORE_DATA_DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${CORE_DATA_DB_PASSWORD:postgres}}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${CORE_DATA_DB_SCHEMA:core_data_service}
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: core_data_flyway_history
    default-schema: ${CORE_DATA_DB_SCHEMA:core_data_service}
    schemas: ${CORE_DATA_DB_SCHEMA:core_data_service}
    locations: ${CORE_DATA_FLYWAY_LOCATIONS:classpath:db/migration}

server:
  port: ${SERVER_PORT:8092}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: ${EUREKA_PREFER_IP_ADDRESS:false}
    hostname: ${EUREKA_INSTANCE_HOSTNAME:127.0.0.1}
    instance-id: ${spring.application.name}:${eureka.instance.hostname}:${server.port}

security:
  jwt:
    audience: ${SECURITY_JWT_AUDIENCE:core-data-service,frontend,account,serban-web}
    allowed-client-ids: ${SECURITY_AUTH_ALLOWED_CLIENT_IDS:frontend,admin-cli,serban-web,account}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
    metrics:
      enabled: true

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO

# P0: ScopeContext cache
scope:
  cache:
    enabled: ${SCOPE_CACHE_ENABLED:false}
    ttl-seconds: ${SCOPE_CACHE_TTL_SECONDS:30}
    max-size: ${SCOPE_CACHE_MAX_SIZE:5000}

# OpenFGA — disabled by default (dev mode)
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:false}
    api-url: ${ERP_OPENFGA_API_URL:http://localhost:4000}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    dev-scope:
      company-ids: 1
      project-ids: 1,2
      warehouse-ids: 1
      super-admin: true
