spring:
  application:
    name: ethics-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${ETHICS_DB_URL:jdbc:postgresql://localhost:5432/ethics}
    username: ${ETHICS_DB_USERNAME:ethics}
    password: ${ETHICS_DB_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: ${ETHICS_DB_SCHEMA:ethics_service}
  flyway:
    enabled: true
    default-schema: ${ETHICS_DB_SCHEMA:ethics_service}
    schemas: ${ETHICS_DB_SCHEMA:ethics_service}
    table: ethics_flyway_history
    locations: classpath:db/migration,classpath:db/vendor/{vendor}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SECURITY_JWT_ISSUER:http://localhost:8081/realms/serban}
          jwk-set-uri: ${SECURITY_JWT_JWK_SET_URI:http://localhost:8081/realms/serban/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8099}
  # Public channel is derived from the ingress-routed Host value. Forwarded
  # client headers are deliberately ignored so X-Forwarded-Host cannot select it.
  forward-headers-strategy: none
  max-http-request-header-size: 16KB

ethics:
  public-org-id: ${ETHICS_PUBLIC_ORG_ID:00000000-0000-0000-0000-000000000035}
  mailbox-session-ttl: ${ETHICS_MAILBOX_SESSION_TTL:15m}
  secret-iterations: ${ETHICS_SECRET_ITERATIONS:210000}
  staff-audience: ${ETHICS_STAFF_AUDIENCE:ethics-manager}
  staff-role: ${ETHICS_STAFF_ROLE:ethics-manager}
  permission-service-base-url: ${ETHICS_PERMISSION_SERVICE_BASE_URL:http://permission-service:8090}
  permission-service-timeout: ${ETHICS_PERMISSION_SERVICE_TIMEOUT:PT3S}
  # Public mutations are accepted only after ingress-nginx overwrites the
  # transport proof header. The NetworkPolicy admits only that namespace.
  secure-transport-required: ${ETHICS_SECURE_TRANSPORT_REQUIRED:true}
  audit-delivery:
    # Source/runtime separation: the worker is wired in every environment but
    # only an explicit overlay may activate scheduled delivery.
    enabled: ${ETHICS_AUDIT_DELIVERY_ENABLED:false}
    poll-delay: ${ETHICS_AUDIT_POLL_DELAY:5s}
    batch-size: ${ETHICS_AUDIT_BATCH_SIZE:50}
    lease-duration: ${ETHICS_AUDIT_LEASE_DURATION:60s}
    retry-base-delay: ${ETHICS_AUDIT_RETRY_BASE_DELAY:5s}
    retry-max-delay: ${ETHICS_AUDIT_RETRY_MAX_DELAY:15m}
    max-attempts: ${ETHICS_AUDIT_MAX_ATTEMPTS:8}
    owner: ${ETHICS_AUDIT_OWNER:${HOSTNAME:ethics-audit-worker}}
  notification-delivery:
    # Provider delivery is opt-in per overlay. Business transactions only
    # persist a case-independent signal; this worker submits it asynchronously.
    enabled: ${ETHICS_NOTIFICATION_DELIVERY_ENABLED:false}
    poll-delay: ${ETHICS_NOTIFICATION_POLL_DELAY:5s}
    batch-size: ${ETHICS_NOTIFICATION_BATCH_SIZE:25}
    lease-duration: ${ETHICS_NOTIFICATION_LEASE_DURATION:60s}
    retry-base-delay: ${ETHICS_NOTIFICATION_RETRY_BASE_DELAY:10s}
    retry-max-delay: ${ETHICS_NOTIFICATION_RETRY_MAX_DELAY:15m}
    max-attempts: ${ETHICS_NOTIFICATION_MAX_ATTEMPTS:8}
    owner: ${ETHICS_NOTIFICATION_OWNER:${HOSTNAME:ethics-notification-worker}}
    orchestrator-base-url: ${ETHICS_NOTIFICATION_ORCHESTRATOR_URL:http://notification-orchestrator:8089}
    token-url: ${ETHICS_NOTIFICATION_TOKEN_URL:http://auth-service:8088/oauth2/token}
    client-id: ${ETHICS_NOTIFICATION_CLIENT_ID:ethics-service}
    client-secret: ${ETHICS_NOTIFICATION_CLIENT_SECRET:}
    token-audience: ${ETHICS_NOTIFICATION_TOKEN_AUDIENCE:notification-orchestrator}
    token-permissions: ${ETHICS_NOTIFICATION_TOKEN_PERMISSIONS:notify:intents:system}
    recipient-subscriber-id: ${ETHICS_NOTIFICATION_RECIPIENT_SUBSCRIBER_ID:}
    locale: ${ETHICS_NOTIFICATION_LOCALE:tr-TR}
    channel: ${ETHICS_NOTIFICATION_CHANNEL:inapp}
    http-timeout: ${ETHICS_NOTIFICATION_HTTP_TIMEOUT:3s}
  evidence:
    # Fail-closed baseline: public text intake and mailbox remain usable while
    # attachment declarations stay unavailable until the isolated TEST
    # pipeline, buckets, credentials and signing key are supplied.
    enabled: ${ETHICS_EVIDENCE_ENABLED:false}
    policy-version: ${ETHICS_EVIDENCE_POLICY_VERSION:faz35-evidence-custody/v1}
    max-bytes: ${ETHICS_EVIDENCE_MAX_BYTES:26214400}
    upload-capability-ttl: ${ETHICS_EVIDENCE_UPLOAD_TTL:10m}
    sealed-retention: ${ETHICS_EVIDENCE_SEALED_RETENTION:30d}
    manifest-signing-key: ${ETHICS_EVIDENCE_MANIFEST_SIGNING_KEY:}
    pipeline:
      enabled: ${ETHICS_EVIDENCE_PIPELINE_ENABLED:false}
      poll-delay: ${ETHICS_EVIDENCE_POLL_DELAY:5s}
      batch-size: ${ETHICS_EVIDENCE_BATCH_SIZE:10}
      lease-duration: ${ETHICS_EVIDENCE_LEASE_DURATION:2m}
      retry-delay: ${ETHICS_EVIDENCE_RETRY_DELAY:1m}
      max-attempts: ${ETHICS_EVIDENCE_MAX_ATTEMPTS:8}
    processor:
      # "clamav-reference" is the bounded TEST processor for UTF-8 text,
      # JPEG and PNG. PDF remains fail-closed until the dedicated no-network
      # CDR worker is deployed; production must not use this in-process mode.
      mode: ${ETHICS_EVIDENCE_PROCESSOR_MODE:disabled}
      clamav-host: ${ETHICS_EVIDENCE_CLAMAV_HOST:localhost}
      clamav-port: ${ETHICS_EVIDENCE_CLAMAV_PORT:3310}
      timeout: ${ETHICS_EVIDENCE_PROCESSOR_TIMEOUT:20s}
      max-decoded-image-pixels: ${ETHICS_EVIDENCE_MAX_IMAGE_PIXELS:40000000}
      scanner-digest: ${ETHICS_EVIDENCE_SCANNER_DIGEST:}
      sanitizer-digest: ${ETHICS_EVIDENCE_SANITIZER_DIGEST:}
      parser-digest: ${ETHICS_EVIDENCE_PARSER_DIGEST:}
      rules-version: ${ETHICS_EVIDENCE_RULES_VERSION:}
      transformation-profile: ${ETHICS_EVIDENCE_TRANSFORM_PROFILE:faz35-baseline-v1}
    s3:
      endpoint: ${ETHICS_EVIDENCE_S3_ENDPOINT:http://localhost:9000}
      region: ${ETHICS_EVIDENCE_S3_REGION:us-east-1}
      path-style-access: ${ETHICS_EVIDENCE_S3_PATH_STYLE:true}
      access-key: ${ETHICS_EVIDENCE_S3_ACCESS_KEY:}
      secret-key: ${ETHICS_EVIDENCE_S3_SECRET_KEY:}
      quarantine-bucket: ${ETHICS_EVIDENCE_QUARANTINE_BUCKET:ethics-evidence-quarantine}
      sealed-bucket: ${ETHICS_EVIDENCE_SEALED_BUCKET:ethics-evidence-sealed}
      derivative-bucket: ${ETHICS_EVIDENCE_DERIVATIVE_BUCKET:ethics-evidence-derivative}
      server-side-encryption: ${ETHICS_EVIDENCE_S3_SSE:AES256}
  # Faz 35 ES multi-tenant public intake — host → org mapping. Empty by default:
  # every public host falls back to public-org-id above (single-tenant cell).
  # Adding a customer = one entry here + their ingress host + staff realm org_id
  # claim. No data-model change (every entity is already org_id-scoped).
  # Example (bracket notation preserves dotted host keys):
  #   ethics:
  #     tenancy:
  #       public-hosts:
  #         "[ihbar.firma.com]": 11111111-1111-1111-1111-111111111111
  tenancy:
    public-hosts: {}

erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:true}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}
    check-cache-ttl-seconds: 5

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

# Public intake fail-fast backpressure. ingress-nginx already limits by IP,
# but a burst can still overshoot the pod. These caps back the ingress limit
# with an in-process semaphore and rate window so 30 concurrent POST bursts
# get 429 immediately instead of piling on the PG pool and returning 503/504.
resilience4j:
  ratelimiter:
    instances:
      publicIntake:
        limit-for-period: ${ETHICS_PUBLIC_INTAKE_RPS:5}
        limit-refresh-period: 1s
        timeout-duration: 0
        register-health-indicator: true
      publicMailbox:
        limit-for-period: ${ETHICS_PUBLIC_MAILBOX_RPS:10}
        limit-refresh-period: 1s
        timeout-duration: 0
        register-health-indicator: true
  bulkhead:
    instances:
      publicIntake:
        max-concurrent-calls: ${ETHICS_PUBLIC_INTAKE_MAX_CONCURRENT:8}
        max-wait-duration: 0
      publicMailbox:
        max-concurrent-calls: ${ETHICS_PUBLIC_MAILBOX_MAX_CONCURRENT:12}
        max-wait-duration: 0

logging:
  level:
    org.springframework.security: INFO
    org.springframework.web: INFO
