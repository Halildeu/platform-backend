spring:
  datasource:
    url: jdbc:h2:mem:ethics-${random.uuid};MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    default-schema: public
    schemas: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://issuer.example.test
          jwk-set-uri: http://issuer.example.test/jwks
ethics:
  public-org-id: 00000000-0000-0000-0000-000000000035
  secret-iterations: 120000
  staff-audience: ethics-manager
  staff-role: ethics-manager
  secure-transport-required: false
erp:
  openfga:
    enabled: false
# Default test ceilings are effectively disabled so pre-existing MockMvc
# suites (5+ sequential POST intake) stay green. Rate-limit / bulkhead
# behaviour under load is covered by dedicated tests that override these
# ceilings via @TestPropertySource + @DirtiesContext.
resilience4j:
  ratelimiter:
    instances:
      publicIntake:
        limit-for-period: 100000
        limit-refresh-period: 1s
        timeout-duration: 0
      publicMailbox:
        limit-for-period: 100000
        limit-refresh-period: 1s
        timeout-duration: 0
  bulkhead:
    instances:
      publicIntake:
        max-concurrent-calls: 1000
        max-wait-duration: 0
      publicMailbox:
        max-concurrent-calls: 1000
        max-wait-duration: 0
