name: platform

services:
  discovery-server:
    build: ./discovery-server
    ports:
      - "8761:8761"
    networks:
      - microservice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres-db:
    image: pgvector/pgvector:pg18
    # K8s + compose paralel stack'te Hikari pool overflow'u önlemek için (Codex #7)
    command: ["postgres", "-c", "max_connections=200"]
    ports:
      - "5432:5432"
    networks:
      - microservice-network
      - platform-test-net
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-users}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./devops/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    ports:
      - "8089:8089"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${USER_SERVICE_PROFILES:-local,docker}
      # OI-02 post-mortem (2026-04-18): rename SERVICE_JWT_* → AUTH_SERVICE_JWT_*.
      # auth-service application.properties reads AUTH_SERVICE_JWT_PRIVATE_KEY
      # (canonical). Legacy SERVICE_JWT_PRIVATE_KEY compose env was IGNORED
      # (naming drift) → ephemeral RSA key generation on every boot.
      # render-backend-env.sh + deploy/docker-compose.prod.yml already use
      # AUTH_SERVICE_JWT_*. Stage compose aligned here.
      AUTH_SERVICE_JWT_PRIVATE_KEY: ${AUTH_SERVICE_JWT_PRIVATE_KEY:-}
      AUTH_SERVICE_JWT_PUBLIC_KEY: ${AUTH_SERVICE_JWT_PUBLIC_KEY:-}
      SERVICE_JWT_KEY_ID: ${SERVICE_JWT_KEY_ID:-local-service-jwt}
      SPRING_CLOUD_VAULT_ENABLED: "false"
      SPRING_CLOUD_VAULT_FAIL_FAST: "false"
      SPRING_CLOUD_VAULT_KV_ENABLED: "false"
      PERMISSION_SERVICE_BASE_URL: ${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      SERVICE_TOKEN_MINT_URL: ${SERVICE_TOKEN_MINT_URL:-http://auth-service:8088/oauth2/token}
      USER_DB_SCHEMA: ${USER_DB_SCHEMA:-public}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # RS256/JWKS doğrulaması
      # 2026-04-19: SECURITY_JWT_ISSUER env-aware (KC_HOSTNAME fix sonrası browser
      # tokens iss=https://ai.acik.com/realms/serban; primary validator canonical env'den
      # gelen public issuer'a hizalanmalı).
      SECURITY_JWT_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_USER_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUER: ${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      SECURITY_JWT_AUDIENCE: user-service
      # Service token doğrulaması için auth-service JWKS (lokal senaryo)
      SERVICE_AUTH_JWK_SET_URI: ${SERVICE_AUTH_JWK_SET_URI:-http://auth-service:8088/oauth2/jwks}
      SERVICE_AUTH_ISSUER: ${SERVICE_AUTH_ISSUER:-auth-service}
      ERP_OPENFGA_ENABLED: ${ERP_OPENFGA_ENABLED:-true}
      ERP_OPENFGA_API_URL: ${ERP_OPENFGA_API_URL:-http://openfga:8080}
      ERP_OPENFGA_STORE_ID: ${ERP_OPENFGA_STORE_ID:-}
      ERP_OPENFGA_MODEL_ID: ${ERP_OPENFGA_MODEL_ID:-}
      # Ek issuer/JWKS listesi Keycloak serban realm'ini işaret eder
      SECURITY_JWT_JWK_SET_URIS: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUERS: ${SECURITY_JWT_ISSUERS:-http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - "8088:8088"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${AUTH_SERVICE_PROFILES:-local,docker}
      # OI-02 post-mortem (2026-04-18): rename SERVICE_JWT_* → AUTH_SERVICE_JWT_*.
      # See user-service block above for rationale.
      AUTH_SERVICE_JWT_PRIVATE_KEY: ${AUTH_SERVICE_JWT_PRIVATE_KEY:-}
      AUTH_SERVICE_JWT_PUBLIC_KEY: ${AUTH_SERVICE_JWT_PUBLIC_KEY:-}
      SERVICE_JWT_KEY_ID: ${SERVICE_JWT_KEY_ID:-local-service-jwt}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-32-bytes-placeholder}
      # STORY-0319 PR #3b: Vault env zinciri placeholder pattern.
      # Compose default `false` korunur (D-105 + C-103 gereği); canonical env
      # staging/prod'da `SPRING_CLOUD_VAULT_ENABLED=true` + AppRole material
      # override eder. Container-side secret fetch böylece aktive olur.
      SPRING_CLOUD_VAULT_ENABLED: ${SPRING_CLOUD_VAULT_ENABLED:-false}
      SPRING_CLOUD_VAULT_FAIL_FAST: ${SPRING_CLOUD_VAULT_FAIL_FAST:-false}
      SPRING_CLOUD_VAULT_KV_ENABLED: ${SPRING_CLOUD_VAULT_KV_ENABLED:-false}
      VAULT_URI: ${VAULT_URI:-http://vault:8200}
      VAULT_SCHEME: ${VAULT_SCHEME:-http}
      VAULT_AUTH_METHOD: ${VAULT_AUTH_METHOD:-TOKEN}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_ROLE_ID: ${VAULT_ROLE_ID:-}
      VAULT_SECRET_ID: ${VAULT_SECRET_ID:-}
      VAULT_SECRET_PREFIX: ${VAULT_SECRET_PREFIX:-stage}
      VAULT_FAIL_FAST: ${VAULT_FAIL_FAST:-false}
      PERMISSION_SERVICE_BASE_URL: ${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      USER_SERVICE_BASE_URL: ${USER_SERVICE_BASE_URL:-http://user-service}
      AUTH_DB_SCHEMA: ${AUTH_DB_SCHEMA:-public}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      AUTH_DB_NAME: ${AUTH_DB_NAME:-users}
      AUTH_DB_USERNAME: ${AUTH_DB_USERNAME:-postgres}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # 2026-04-18 OI-03 canary setup drift (P1.8 service token mint contract):
      # auth-service ServiceTokenController reads security.service-clients.user-service
      # which maps to SERVICE_CLIENT_USER_SERVICE_SECRET. Canonical env had this key
      # since PR #447 but compose env chain never wired it → container registered
      # no clients → /oauth2/token always 401 invalid_client. Blocks canary setup
      # (zanzibar-canary-setup.mjs uses this path for user-service provisioning).
      SERVICE_CLIENT_USER_SERVICE_SECRET: ${SERVICE_CLIENT_USER_SERVICE_SECRET:-}
      # Permission-service internal API key — same wiring class, also required
      # by mint audience flow.
      PERMISSION_SERVICE_INTERNAL_API_KEY: ${PERMISSION_SERVICE_INTERNAL_API_KEY:-}
      LOG_SECURITY_LEVEL: ${LOG_SECURITY_LEVEL:-DEBUG}
    depends_on:
      discovery-server:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  variant-service:
    build:
      context: .
      dockerfile: ./variant-service/Dockerfile
    ports:
      - "8091:8091"
    networks:
      - microservice-network
    environment:
      SPRING_PROFILES_ACTIVE: ${VARIANT_SERVICE_PROFILES:-local,docker}
      SPRING_CLOUD_VAULT_ENABLED: "false"
      SPRING_CLOUD_VAULT_FAIL_FAST: "false"
      SPRING_CLOUD_VAULT_KV_ENABLED: "false"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # RS256/JWKS doğrulaması (user JWT).
      # 2026-04-19: SECURITY_JWT_ISSUER env-aware. KC_HOSTNAME fix sonrası browser
      # tokens iss=https://ai.acik.com/realms/serban; primary issuer validator'ı
      # canonical env'den aldığımız public issuer'a hizalanmalı. Local dev
      # fallback `http://localhost:8081/...` olarak korunur.
      SECURITY_JWT_JWK_SET_URI: http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      SECURITY_JWT_ISSUER: ${SECURITY_JWT_ISSUER:-http://localhost:8081/realms/serban}
      SECURITY_JWT_ISSUERS: ${SECURITY_JWT_ISSUERS:-https://ai.acik.com/realms/serban,http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban}
      SERVICE_AUTH_JWK_SET_URI: http://auth-service:8088/oauth2/jwks
      SERVICE_AUTH_ISSUER: auth-service
      SECURITY_JWT_AUDIENCE: ${VARIANT_SERVICE_SECURITY_JWT_AUDIENCE:-account}
      ERP_OPENFGA_ENABLED: ${ERP_OPENFGA_ENABLED:-true}
      ERP_OPENFGA_API_URL: ${ERP_OPENFGA_API_URL:-http://openfga:8080}
      ERP_OPENFGA_STORE_ID: ${OPENFGA_STORE_ID:-}
      ERP_OPENFGA_MODEL_ID: ${OPENFGA_MODEL_ID:-}
      # B5 (Rev 19): AuthzVersion polling needs permission-service base URL
      PERMISSION_SERVICE_BASE_URL: ${PERMISSION_SERVICE_BASE_URL:-http://permission-service:8084}
      # Opsiyonel diğer ayarlar
      VARIANT_DB_URL: ${VARIANT_DB_URL:-jdbc:postgresql://postgres-db:5432/users}
      VARIANT_DB_USERNAME: ${VARIANT_DB_USERNAME:-postgres}
      VARIANT_DB_PASSWORD: ${VARIANT_DB_PASSWORD:-postgres}
      VARIANT_DB_SCHEMA: ${VARIANT_DB_SCHEMA:-variant_service}
      EUREKA_SERVER_URL: ${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  core-data-service:
    build:
      context: .
      dockerfile: ./core-data-service/Dockerfile
    ports:
      - "8092:8092"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${CORE_DATA_SERVICE_PROFILES:-local,docker}
      - SERVER_PORT=8092
      - SPRING_DATASOURCE_URL=${CORE_DATA_DB_URL:-jdbc:postgresql://postgres-db:5432/users}
      - SPRING_DATASOURCE_USERNAME=${CORE_DATA_DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${CORE_DATA_DB_PASSWORD:-postgres}
      - CORE_DATA_DB_SCHEMA=${CORE_DATA_DB_SCHEMA:-core_data_service}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      - SECURITY_JWT_AUDIENCE=${CORE_DATA_SECURITY_JWT_AUDIENCE:-frontend,user-service,core-data-service}
      - ERP_OPENFGA_ENABLED=${ERP_OPENFGA_ENABLED:-true}
      - ERP_OPENFGA_API_URL=${ERP_OPENFGA_API_URL:-http://openfga:8080}
      - ERP_OPENFGA_STORE_ID=${ERP_OPENFGA_STORE_ID:-}
      # B5 (Rev 19): AuthzVersion polling needs permission-service base URL
      - PERMISSION_SERVICE_BASE_URL=${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      - ERP_OPENFGA_MODEL_ID=${ERP_OPENFGA_MODEL_ID:-}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      openfga:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8092/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      # Stage/local: host port hardcoded 8080 (matches stage `WEB_GATEWAY_UPSTREAM`).
      # Prod uses `deploy/docker-compose.prod.yml` which honors `${API_GATEWAY_PORT:-8082}`.
      # 2026-04-18 incident: canonical env populated `API_GATEWAY_PORT=8082` from
      # prod example confused stage operators → nginx upstream 8082 → 502. Stage
      # compose intentionally ignores the variable to avoid this drift class.
      - "8080:8080"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${API_GATEWAY_PROFILES:-local,docker}
      # RS256/JWKS doğrulaması gateway tarafında Keycloak JWKS üzerinden yapılır
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      # PR F (Codex CNS thread 019d99ba Tur 12): hardcoded audience staging'de
      # browser PKCE `frontend` token (aud=[user-service,...,realm-management,broker,account])
      # için "No suitable decoder accepted the token" 500 üretiyordu. Canonical+repo env
      # `frontend,account,realm-management,broker` içerir ama compose hardcode eziyordu.
      - SECURITY_JWT_AUDIENCE=${SECURITY_JWT_AUDIENCE:-user-service,permission-service,variant-service,core-data-service}
      # Ek issuer: Keycloak (lokal dev)
      - SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs,http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUERS=${SECURITY_JWT_ISSUERS:-http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban}
      - SECURITY_JWT_SECONDARY_ISSUER=http://localhost:8081/realms/serban
      - SECURITY_JWT_SECONDARY_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      # PR #426 (CNS-20260416-003 gateway 500 root cause fix).
      # AudienceValidator fallback order: aud match → azp in allowedClientIds → client_id match.
      # Token audience is "account" (Keycloak default) and azp is the client that minted
      # the token (e.g. canary-load, frontend, serban-web). Without this env var the gateway
      # falls back to a code default that does not include canary-load, so every canary
      # token returns 500 "No suitable decoder accepted the token". Prod compose already
      # forwards this variable — staging was the drift.
      - SECURITY_AUTH_ALLOWED_CLIENT_IDS=${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account,canary-load}
      # Gateway CORS allowed-origins (PR C, Codex CNS thread 019d97c7 Tur 10).
      # Browser Origin header ile gelen istek fixed localhost allowlist'te olmadığında
      # 403 dönüyordu; stage/prod'da https://ai.acik.com zorunlu. Exact match, wildcard yok
      # (allow-credentials=true ile wildcard güvensiz).
      # 2026-04-19: Default'a stage public origin eklendi — canonical env
      # GATEWAY_CORS_ALLOWED_ORIGINS key'i yoksa preflight 403 /api/auth/cookie
      # ve diğer browser endpoint'leri ai.acik.com origin'inden.
      - GATEWAY_CORS_ALLOWED_ORIGINS=${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:3004,https://ai.acik.com}
      # 2026-04-20 QLTY-PROACTIVE-06 (Faz 1 / Option A): audit route feature-flag.
      # Selects which backend owns GET /api/audit/events (the legacy list).
      # Values: `lb://USER-SERVICE` (legacy) or `lb://PERMISSION-SERVICE` (consolidation target).
      # Stage cutover sequence: set AUDIT_BACKEND_URI=lb://PERMISSION-SERVICE in canonical env,
      # recreate api-gateway container, monitor sweep + compare endpoint (Faz 2). Rollback =
      # flip env + recreate (no code change). PR #514 already routes /live + /export subsurfaces
      # explicitly to permission-service via routes[16,17] — this flag governs ONLY the base list.
      - AUDIT_BACKEND_URI=${AUDIT_BACKEND_URI:-lb://USER-SERVICE}
      - SPRING_CLOUD_VAULT_ENABLED="false"
      - SPRING_CLOUD_VAULT_FAIL_FAST="false"
      - SPRING_CLOUD_VAULT_KV_ENABLED="false"
      - SPRING_CLOUD_VAULT_APP_ROLE_ROLE_ID=${VAULT_ROLE_ID:-}
      - SPRING_CLOUD_VAULT_APP_ROLE_SECRET_ID=${VAULT_SECRET_ID:-}
    depends_on:
      discovery-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      variant-service:
        condition: service_healthy
      core-data-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.5
    command: ${KEYCLOAK_START_COMMAND:-start-dev --import-realm}
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      # v26: KC_HOSTNAME_STRICT replaced by KC_HOSTNAME
      - KC_HTTP_ENABLED=true
      - KC_PROXY_HEADERS=${KC_PROXY_HEADERS:-xforwarded}
      - KC_HOSTNAME=${KC_HOSTNAME:-http://localhost:8081}
      - KC_HOSTNAME_BACKCHANNEL_DYNAMIC=${KC_HOSTNAME_BACKCHANNEL_DYNAMIC:-true}
      - KC_HOSTNAME_DEBUG=true
      # PostgreSQL backend (H2 yerine — data kaybi onlenir)
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://postgres-db:5432/keycloak
      - KC_DB_USERNAME=${KC_DB_USERNAME:-keycloak_user}
      - KC_DB_PASSWORD=${KC_DB_PASSWORD:-keycloak}
      # Health endpoint (port 9000)
      - KC_HEALTH_ENABLED=true
    ports:
      - "8081:8080"
    networks:
      - microservice-network
      - platform-test-net
    volumes:
      - ./backend/keycloak/exports:/opt/keycloak/data/import
      - ./backend/keycloak/themes:/opt/keycloak/themes
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && head -1 <&3 | grep -q '200 OK'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  vault:
    image: hashicorp/vault:1.21.4
    container_name: platform-vault-1
    user: "0:0"
    cap_add:
      - IPC_LOCK
    # Vault merges every .hcl file in the -config directory. Base vault.hcl
    # stays unchanged; the active seal file is mounted alongside it via
    # VAULT_SEAL_FILE (P1.10). Default `vault-seal-disabled.hcl` is a no-op
    # placeholder → Shamir seal (local/staging behaviour preserved). Prod
    # overrides VAULT_SEAL_FILE in deploy/docker-compose.prod.yml to select
    # one of vault-seal-awskms.hcl / gcpckms / azurekeyvault / transit. See
    # docs/04-operations/RUNBOOKS/RB-vault.md.
    command: vault server -config=/vault/config/
    ports:
      - "8200:8200"
      - "8201:8201"
    networks:
      - microservice-network
    volumes:
      - vault_data:/vault/file
      - ./devops/vault/vault.hcl:/vault/config/vault.hcl:ro
      - ${VAULT_SEAL_FILE:-./devops/vault/vault-seal-disabled.hcl}:/vault/config/active-seal.hcl:ro
    healthcheck:
      # vault status: exit 0=unsealed+healthy, exit 1=error, exit 2=sealed
      # unseal-loop scripti otomatik acar, sonra exit 0 doner
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 10s

  vault-unseal:
    image: hashicorp/vault:1.21.4
    depends_on:
      vault:
        condition: service_started
    networks:
      - microservice-network
    volumes:
      # VAULT_DEV_PATH override: staging/prod'da permanent state path kullanilir
      # (self-hosted runner workdir ephemeral — bind mount stale olur).
      # Local dev: default "./.vault-dev" (dev_init.sh ile uyumlu).
      # Staging: env'de VAULT_DEV_PATH=/home/halil/platform/state/vault-dev set edilmeli.
      - ${VAULT_DEV_PATH:-./.vault-dev}:/vault-dev:ro
      - ./devops/vault:/vault/config:ro
    environment:
      VAULT_ADDR: http://vault:8200
    command: ["/bin/sh", "/vault/config/dev-unseal-loop.sh"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://vault:8200"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 5s

  # Faz 18.4 — vault-snapshot + vault-audit-init RETIRED
  # Reason: stage/dev compose'da bu bloklar zaten zombie stub idi (sleep infinity); prod compose'da
  # da aynı zombie davranış gözlemlendi (2026-04-23+ entrypoint /bin/sh sleep infinity). Host cron
  # authoritative Apr 20'den beri (platform-k8s-gitops/bootstrap/vault-snapshot-cron.sh +
  # vault-audit-init-cron.sh). 4 gün live evidence Apr 21-24 OK prod/test (prod 80K + test 60K).
  # Replacement: platform-k8s-gitops bootstrap + crontab (02:00 snapshot + 02:15 audit-init ensure).
  # Refs: platform-k8s-gitops PR #104+#105 + docs/RB-vault-ops-host-cron.md

  # Faz 18.3 PR-B — service-manager service RETIRED
  # Reason: Docker socket cross-realm control plane riski (start/stop/restart/logs
  # write-op). /api/services/ edge route HTTP 410 Gone (PR #100/101).
  # Replacement: MFE admin/services compat page statik Ops Links (platform-ssot PR #550).
  # History: bu bloğu arşivden geri getirmek gerekmesin — ADR-0002 D6 + D34 Environment
  # Independence ile uyumsuz (cross-realm trafik üretiyordu).

  openfga-migrate:
    image: openfga/openfga:${OPENFGA_VERSION:-v1.11.2}
    command: migrate
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga"
    networks:
      - microservice-network
    depends_on:
      postgres-db:
        condition: service_healthy

  openfga:
    image: openfga/openfga:${OPENFGA_VERSION:-v1.11.2}
    command: run
    environment:
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/${POSTGRES_DB:-users}?sslmode=disable&search_path=openfga"
      OPENFGA_PLAYGROUND_ENABLED: "true"
      OPENFGA_METRICS_ENABLED: "true"
      OPENFGA_LOG_LEVEL: info
    ports:
      - "4000:8080"
      - "4001:8081"
      - "4002:3000"
    networks:
      - microservice-network
    depends_on:
      openfga-migrate:
        condition: service_completed_successfully
    # healthcheck removed: OpenFGA minimal image has no /bin/sh or wget.
    # Health verified externally via curl http://localhost:4000/healthz
    # Service readiness ensured by depends_on openfga-migrate: service_completed_successfully

  permission-service:
    # profiles: ["legacy"]  # Re-enabled: roles CRUD still lives here, synced with OpenFGA
    build:
      context: .
      dockerfile: ./permission-service/Dockerfile
    ports:
      - "8090:8084"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${PERMISSION_SERVICE_PROFILES:-local,docker}
      - PERMISSION_DB_URL=${PERMISSION_DB_URL:-jdbc:postgresql://postgres-db:5432/users}
      - PERMISSION_DB_USERNAME=${PERMISSION_DB_USERNAME:-postgres}
      - PERMISSION_DB_PASSWORD=${PERMISSION_DB_PASSWORD:-postgres}
      - PERMISSION_DB_SCHEMA=${PERMISSION_DB_SCHEMA:-public}
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_LOCAL_DEV_USER_ID=${SECURITY_LOCAL_DEV_USER_ID:-local-dev}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # STORY-0319 PR #3b: Vault env zinciri placeholder pattern. Compose
      # default `false` korunur (D-105 + C-103); canonical env override eder.
      - SPRING_CLOUD_VAULT_ENABLED=${SPRING_CLOUD_VAULT_ENABLED:-false}
      - SPRING_CLOUD_VAULT_FAIL_FAST=${SPRING_CLOUD_VAULT_FAIL_FAST:-false}
      - SPRING_CLOUD_VAULT_KV_ENABLED=${SPRING_CLOUD_VAULT_KV_ENABLED:-false}
      - VAULT_URI=${VAULT_URI:-http://vault:8200}
      - VAULT_SCHEME=${VAULT_SCHEME:-http}
      - VAULT_AUTH_METHOD=${VAULT_AUTH_METHOD:-TOKEN}
      - VAULT_TOKEN=${VAULT_TOKEN:-}
      - VAULT_ROLE_ID=${VAULT_ROLE_ID:-}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID:-}
      - VAULT_SECRET_PREFIX=${VAULT_SECRET_PREFIX:-stage}
      - VAULT_FAIL_FAST=${VAULT_FAIL_FAST:-false}
      # Legacy internal API key doğrulaması kapatıldı (JWT zorunlu)
      - SECURITY_LEGACY_API_KEY_ENABLED=false
      # User JWT'leri için RS256 (JWK) doğrulaması. FE token'ları Keycloak (serban) realm'inden gelir.
      - SECURITY_JWT_USER_JWK_SET_URI=${SECURITY_JWT_USER_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      # RS256 için JWKS ayarı (service tokens)
      - SECURITY_JWT_JWK_SET_URI=${SECURITY_JWT_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      # Audience doğrulaması; token üretimindeki aud ile eşleşmeli
      - SECURITY_JWT_AUDIENCE=${SECURITY_JWT_AUDIENCE:-permission-service}
      # 2026-04-18 OI-03 Bug B (Codex thread 019da137): canary-restricted
      # valid KC token ile /api/v1/authz/me 401. Root cause: permission-service
      # AudienceValidator uses SECURITY_AUTH_ALLOWED_CLIENT_IDS as azp fallback
      # when aud doesn't match (PR #426 CNS-20260416-003). Canonical env has
      # this key but container env chain didn't propagate it → canary-load
      # client tokens rejected at aud-validator fallback.
      - SECURITY_AUTH_ALLOWED_CLIENT_IDS=${SECURITY_AUTH_ALLOWED_CLIENT_IDS:-frontend,admin-cli,serban-web,account,canary-load}
      # Ek issuer listesi Keycloak serban realm'i işaret eder
      - SECURITY_JWT_JWK_SET_URIS=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUERS=${SECURITY_JWT_ISSUERS:-http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban}
      # Secondary issuer: frontend tokens come from localhost:8081.
      # 2026-04-18 OI-03 Bug B deepest layer: SECONDARY_AUDIENCE was hardcoded
      # `permission-service` → canonical env override ignored → canary-load
      # client tokens (aud=account) rejected by secondary decoder. Now supports
      # canonical env multi-audience list via substitution pattern (same as
      # primary AUDIENCE above).
      - SECURITY_JWT_SECONDARY_JWK_SET_URI=${SECURITY_JWT_SECONDARY_JWK_SET_URI:-http://keycloak:8080/realms/serban/protocol/openid-connect/certs}
      - SECURITY_JWT_SECONDARY_ISSUER=${SECURITY_JWT_SECONDARY_ISSUER:-http://localhost:8081/realms/serban}
      - SECURITY_JWT_SECONDARY_AUDIENCE=${SECURITY_JWT_SECONDARY_AUDIENCE:-permission-service}
      - ERP_OPENFGA_ENABLED=${ERP_OPENFGA_ENABLED:-true}
      - ERP_OPENFGA_API_URL=${ERP_OPENFGA_API_URL:-http://openfga:8080}
      - ERP_OPENFGA_STORE_ID=${ERP_OPENFGA_STORE_ID:-}
      # B5 (Rev 19): AuthzVersion polling needs permission-service base URL
      - PERMISSION_SERVICE_BASE_URL=${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      - ERP_OPENFGA_MODEL_ID=${ERP_OPENFGA_MODEL_ID:-}
      - PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE=${PERMISSION_BOOTSTRAP_DEFAULT_ADMIN_ASSIGNMENTS_USER_TABLE:-user_service.users}
      - PERMISSION_AUTHZ_USER_TABLE=${PERMISSION_AUTHZ_USER_TABLE:-user_service.users}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_healthy
      vault:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  report-service:
    build:
      context: .
      dockerfile: ./report-service/Dockerfile
    ports:
      - "8095:8095"
    networks:
      - microservice-network
    environment:
      - SPRING_PROFILES_ACTIVE=${REPORT_SERVICE_PROFILES:-local,docker}
      - SERVER_PORT=8095
      - REPORT_MSSQL_HOST=${REPORT_MSSQL_HOST:-host.docker.internal}
      - REPORT_MSSQL_PORT=${REPORT_MSSQL_PORT:-1433}
      - REPORT_MSSQL_DB=${REPORT_MSSQL_DB:-reporting}
      - REPORT_MSSQL_USERNAME=${REPORT_MSSQL_USERNAME:-sa}
      - REPORT_MSSQL_PASSWORD=${REPORT_MSSQL_PASSWORD:-}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=${SECURITY_JWT_ISSUER:-http://keycloak:8080/realms/serban}
      - SECURITY_JWT_ISSUERS=${SECURITY_JWT_ISSUERS:-http://keycloak:8080/realms/serban,http://localhost:8081/realms/serban}
      - SECURITY_JWT_AUDIENCE=report-service,account,frontend
      - PERMISSION_SERVICE_INTERNAL_API_KEY=${PERMISSION_SERVICE_INTERNAL_API_KEY:-dev-local-audit-mirror-key}
      # PR6c-1 follow-up (CNS-20260416-003 post-deploy): Zanzibar / OpenFGA
      # wiring for direct SDK authz. Mirrors user-service, variant-service,
      # core-data-service environment blocks. Without these the resolver in
      # backend/report-service/.../authz/OpenFgaAuthzMeBuilder falls back to
      # disabled mode and /api/v1/reports returns an empty list for every
      # caller — including super-admins.
      - ERP_OPENFGA_ENABLED=${ERP_OPENFGA_ENABLED:-true}
      - ERP_OPENFGA_API_URL=${ERP_OPENFGA_API_URL:-http://openfga:8080}
      - ERP_OPENFGA_STORE_ID=${ERP_OPENFGA_STORE_ID:-}
      - ERP_OPENFGA_MODEL_ID=${ERP_OPENFGA_MODEL_ID:-}
      - PERMISSION_SERVICE_BASE_URL=${PERMISSION_SERVICE_BASE_URL:-http://permission-service}
      - AUTHZ_USER_TABLE=${AUTHZ_USER_TABLE:-user_service.users}
      # PostgreSQL — Docker network hostname
      - REPORT_PG_HOST=postgres-db
      - REPORT_PG_PORT=5432
      - REPORT_PG_DB=${POSTGRES_DB:-users}
      - REPORT_PG_USERNAME=${POSTGRES_USER:-postgres}
      - REPORT_PG_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      # SQL Server baglantisi optional — erisim yoksa servis yine de baslar
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      # DB health indicator'u devre disi birak (SQL Server ulasılamaz oldugunda timeout yapar)
      - MANAGEMENT_HEALTH_DB_ENABLED=false
      # Context Health Dashboard — orchestrator JSON dosyalarini okur
      - CONTEXT_HEALTH_ENABLED=${CONTEXT_HEALTH_ENABLED:-false}
      - CONTEXT_HEALTH_DATA_DIR=/opt/context-health/reports
      - CONTEXT_HEALTH_INDEX_DIR=/opt/context-health/index
    volumes:
      - ${CONTEXT_HEALTH_HOST_REPORTS:-/dev/null}:/opt/context-health/reports:ro
      - ${CONTEXT_HEALTH_HOST_INDEX:-/dev/null}:/opt/context-health/index:ro
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8095/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  schema-service:
    build:
      context: .
      dockerfile: ./schema-service/Dockerfile
    ports:
      - "8096:8096"
    networks:
      - microservice-network
    environment:
      - SERVER_PORT=8096
      # 2026-04-18 Codex Thread 5 #3: schema-service was reading REPORT_MSSQL_*
      # env vars as fallback — wrong contract. SCHEMA_MSSQL_* is the canonical
      # schema-service contract (prod compose, canonical env, write script).
      # Compose default falls back to sibling REPORT_MSSQL_* only if SCHEMA_*
      # explicitly missing — and now warns loudly via compose env ordering.
      - SCHEMA_MSSQL_HOST=${SCHEMA_MSSQL_HOST:-${REPORT_MSSQL_HOST:-host.docker.internal}}
      - SCHEMA_MSSQL_PORT=${SCHEMA_MSSQL_PORT:-${REPORT_MSSQL_PORT:-1433}}
      - SCHEMA_MSSQL_DB=${SCHEMA_MSSQL_DB:-${REPORT_MSSQL_DB:-workcube_mikrolink}}
      - SCHEMA_MSSQL_USERNAME=${SCHEMA_MSSQL_USERNAME:-${REPORT_MSSQL_USERNAME:-sa}}
      - SCHEMA_MSSQL_PASSWORD=${SCHEMA_MSSQL_PASSWORD:-${REPORT_MSSQL_PASSWORD:-}}
      - SCHEMA_DEFAULT_SCHEMA=${SCHEMA_DEFAULT_SCHEMA:-workcube_mikrolink}
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=${EUREKA_SERVER_URL:-http://discovery-server:8761/eureka}
      - SECURITY_JWT_JWK_SET_URI=http://keycloak:8080/realms/serban/protocol/openid-connect/certs
      - SECURITY_JWT_ISSUER=http://keycloak:8080/realms/serban
      - AUTH_MODE=${AUTH_MODE:-permitAll}
      - SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT=-1
      - MANAGEMENT_HEALTH_DB_ENABLED=false
    depends_on:
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8096/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  loki:
    image: grafana/loki:3.5.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
    networks:
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability-network
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.7.2
    ports:
      - "3200:3200"
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    command: ["-config.file=/etc/tempo/config.yml"]
    volumes:
      - ./infra/tempo/config.yml:/etc/tempo/config.yml:ro
      - tempo_data:/var/tempo
    networks:
      - observability-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 -O- http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    # container_name removed — compose auto-names as platform-prometheus-1
    volumes:
      - ./scripts/perf/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - observability-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:12.4.1
    # container_name removed — compose auto-names as platform-grafana-1
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3010:3000"
    volumes:
      - ./scripts/perf/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./scripts/perf/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./scripts/perf/grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./scripts/perf/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability-network
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  # SSOT canonical volume definitions (must match deploy/docker-compose.prod.yml).
  # 2026-04-14: staging↔prod volume name drift (vault-data vs vault_data, etc.)
  # caused repeated fresh-volume incidents when deploy-backend.sh switched
  # between composes. Explicit `name:` pins Docker-level volume name regardless
  # of compose project name or file origin. See doctor-infra.sh Section K and
  # RB-compose-volume-ssot.md for drift guard + migration.
  postgres_data:
    name: platform_postgres_data
  vault_data:
    name: platform_vault_data
  vault_logs:
    name: platform_vault_logs
  # Faz 18.4 — vault_snapshots volume removed with vault-snapshot sidecar retirement
  # Replacement: host path /home/halil/platform/backup/vault/{prod,test}/
  loki_data:
    name: platform_loki_data
  tempo_data:
    name: platform_tempo_data

networks:
  microservice-network:
    driver: bridge
  observability-network:
    driver: bridge
  platform-test-net:
    external: true
