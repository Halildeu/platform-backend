spring:
  config:
    import: optional:vault://secret/${VAULT_SECRET_PREFIX:stage}/db/${spring.application.name}
  cloud:
    vault:
      enabled: true
      authentication: ${VAULT_AUTH_METHOD:TOKEN}
      token: ${VAULT_TOKEN:}
      app-role:
        role-id: ${VAULT_ROLE_ID:}
        secret-id: ${VAULT_SECRET_ID:}
        app-role-path: approle
      kv:
        enabled: true
        backend: secret
      uri: ${VAULT_URI:https://vault:8200}
      scheme: ${VAULT_SCHEME:http}
      fail-fast: ${VAULT_FAIL_FAST:true}
      ssl:
        trust-store: ${VAULT_TRUSTSTORE:}
        trust-store-type: PEM
# STORY-0319 PR #3b: Spring Cloud Vault actuator health indicator wiring.
# /actuator/health/vault endpoint internal-only expose edilir — AC-0319
# Senaryo 4 bu endpoint'e staging host'tan curl ile "UP" bekliyor.
# application.properties'ta exposure `health,info,metrics,prometheus` zaten
# mevcut; burada sadece show-details + probes + vault indicator eklendi.
management:
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    vault:
      enabled: true
