# application-k8s.yml — permission-service (platform-k8s-gitops uyumlu)
# D7 Eureka kaldırıldı, D18 management port 8081, D19 host Service+Endpoints
# D-003 TRANSFORMED: permission-service OpenFGA authz hub rolünde aktif;
# K8s Service port 8090 → targetPort 8084 (container internal) kontratı.

spring:
  application:
    name: permission-service
  threads:
    virtual:
      enabled: true
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
    # Faz 21.3 PR-C: secondary datasource for data_access.* schema
    # (V19/V20 in platform-k8s-gitops). Activation gated on the explicit
    # `enabled` boolean sentinel — see ReportsDbDataSourceConfig.
    # The URL alone is not enough: with a default `${REPORTS_DB_URL:}`
    # Spring Boot resolves an empty string when the env is unset, and
    # @ConditionalOnProperty(name=...url) treats "present and non-false"
    # as match — leaking the bean graph in any k8s pod where the env
    # was not wired. The explicit `enabled` flag avoids that trap.
    reports-db:
      enabled: ${REPORTS_DB_ENABLED:false}
      url: ${REPORTS_DB_URL:}
      username: ${REPORTS_DB_USERNAME:}
      password: ${REPORTS_DB_PASSWORD:}
      driver-class-name: org.postgresql.Driver
      hikari:
        maximum-pool-size: ${REPORTS_DB_POOL_MAX:5}
        minimum-idle: ${REPORTS_DB_POOL_MIN:1}
        connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8084}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        # permission-service specifik: runbook'lar `/actuator/metrics/tuple_sync_outbox_pending`
        # gibi metric endpoint'ine yaslanıyor. Parity icin metrics expose.
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

# Eureka eksplicit disable — base application.properties default=true, k8s'te OFF olmalı
eureka:
  client:
    enabled: false

# OpenFGA (Zanzibar) — D-003 TRANSFORMED: permission-service authz hub.
# K8s Service DNS `openfga:8080` (gitops base/apps/openfga/service.yaml kontratı).
# `enabled` k8s profile'da default=true (runbook RB-zanzibar-canary + decision registry);
# base application.properties default=false local/dev icin korunur.
erp:
  openfga:
    enabled: ${ERP_OPENFGA_ENABLED:true}
    api-url: ${ERP_OPENFGA_API_URL:http://openfga:8080}
    store-id: ${ERP_OPENFGA_STORE_ID:}
    model-id: ${ERP_OPENFGA_MODEL_ID:}

# permission-service authz user table + user-service lookup base URL.
# Base default `http://user-service:8089` zaten K8s-uyumlu (Service DNS).
# Eksplicit yazarak ConfigMap override noktasini goster.
permission:
  authz:
    user-lookup-base-url: ${PERMISSION_AUTHZ_USER_LOOKUP_BASE_URL:http://user-service:8089}
    user-table: ${PERMISSION_AUTHZ_USER_TABLE:user_service.users}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
