# application-k8s.yml — report-service (platform-k8s-gitops uyumlu)
# D7 Eureka kaldırıldı, D18 management port 8081, D19 host Service+Endpoints
# NOT: Primary datasource MSSQL (reporting views), metadata PostgreSQL

spring:
  application:
    name: report-service
  threads:
    virtual:
      enabled: true

# ADR-0005 Dual DataSource Reporting — Workcube MSSQL secondary (read-only live)
# Activation: REPORT_MSSQL_ENABLED=true → ESO ExternalSecret kv/platform/mssql-external mounted
# Disabled by default: false → WorkcubeMssqlConfig + Repo + Controller + HealthIndicator hepsi inactive
report:
  mssql:
    enabled: ${REPORT_MSSQL_ENABLED:false}
    jdbc-url: ${REPORT_MSSQL_JDBC_URL:}
    username: ${REPORT_MSSQL_USERNAME:}
    password: ${REPORT_MSSQL_PASSWORD:}
    pool:
      max-size: ${REPORT_MSSQL_POOL_MAX:5}
      connection-timeout-ms: ${REPORT_MSSQL_POOL_CONN_TIMEOUT_MS:10000}
      max-lifetime-ms: ${REPORT_MSSQL_POOL_MAX_LIFETIME_MS:300000}
  cloud:
    vault:
      enabled: false
    discovery:
      enabled: false
    service-registry:
      auto-registration:
        enabled: false
  datasource:
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:10}
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    open-in-view: false
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/serban}
          jwk-set-uri: ${KEYCLOAK_JWKS_URI:http://keycloak:8080/realms/serban/protocol/openid-connect/certs}

server:
  port: ${SERVER_PORT:8095}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,prometheus}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      # ADR-0005: Workcube MSSQL custom indicator readiness'a DAHİL DEĞİL
      # MSSQL down olduğunda pod evict/restart döngüsü olmaması için.
      group:
        readiness:
          include: db,ping
          exclude: workcubeMssql
        liveness:
          include: ping
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:0.1}

logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSSXXX}","level":"%p","trace_id":"%X{traceId:-}","span_id":"%X{spanId:-}","thread":"%t","logger":"%logger{36}","message":"%m"}%n'
