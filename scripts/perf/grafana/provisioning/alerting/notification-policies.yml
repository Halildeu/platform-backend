apiVersion: 1

policies:
  - orgId: 1
    receiver: default-email
    group_by:
      - component
      - severity
    routes:
      - receiver: default-email
        object_matchers:
          - [ "component", "=", "reports-guard" ]
      - receiver: default-email
        object_matchers:
          - [ "component", "=", "export-guard" ]
      - receiver: default-email
        object_matchers:
          - [ "component", "=", "zanzibar-authz" ]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
