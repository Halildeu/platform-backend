global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8080']

  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8089']

  - job_name: 'permission-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8090']

  - job_name: 'core-data-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['host.docker.internal:8092']

  - job_name: 'openfga'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4000']

  - job_name: 'vault'
    metrics_path: /v1/sys/metrics
    params:
      format: ['prometheus']
    bearer_token_file: /etc/prometheus/vault-token
    static_configs:
      - targets: ['vault:8200']

